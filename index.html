тока, барьерная задача не начнет выполнение пока все предыдущие задачи поставленные в очерерь не выполнятся и все задачи поставленные в очередь после барьерной не начнут выполняться пока барьерная задача не будет выполнена"}, {"id": "10000032-0000-0000-0000-000000000032", "question": "В чем разница между CALayer и UIView?", "answer": "UIView является контейнером для layer, UIView отвечает за отображение и взаимодействие с пользователем, layer отвечает за отрисовку и выполнение анимаций. То есть UIView учавствует в Responder Chain, CALayer - нет"}, {"id": "10000033-0000-0000-0000-000000000033", "question": "Какие есть способы улучшения производительности в приложении? CPU / GPU Bounding", "answer": "Производительность UI часто упирается в CPU или GPU bottleneck.\n\nCPU-bound — когда узкое место в вычислениях:\n - сложный layout (Auto Layout, SwiftUI)\nheavy drawing (Core Graphics)\n - работа с данными, декодинг, diffing\n\nGPU-bound — когда узкое место в рендеринге:\n - много прозрачности (alpha blending)\n - тени, маски, скругления → могут вызывать offscreen rendering\n - большой overdraw (перерисовка одних и тех же пикселей)\n\nСначала определяем, где bottleneck — CPU или GPU (через Instruments / Core Animation).\n- Если CPU — смотрим на layout, diffing, heavy drawing.\n- Если GPU — на overdraw, transparency, offscreen rendering.\nИ уже после этого применяем точечные оптимизации, например упрощение иерархии, кэширование, или в редких случаях замену UIView на CALayer."}, {"id": "10000034-0000-0000-0000-000000000034", "question": "Что такое contentHuggingPriority и contentCompressionResistancePriority?", "answer": "contentHuggingPriority - запрет на расширение, чем выше значение, тем сильнее view будет сопротивляться расширению. \n- Высокое значение = view НЕ хочет расширяться, остается компактным \n- Низкое значение = view готово расширяться, занимая свободное пространство \ncontentCompressionResistancePriority - запрет на сжатие, чем выше значение, тем сильнее view будет сопротивляться сжатию. \n- Высокое значение = view НЕ хочет сжиматься, будет отображать весь контент \n- Низкое значение = view готово сжиматься, может обрезать контент \n можно посмотреть тут https://www.youtube.com/watch?v=QPETRhylwVw"}, {"id": "10000034-0000-0000-0000-000000000035", "question": "Зачем нужны протоколы ExpressibleBy...", "answer": "Это протоколы, которые позволяют пользовательским типам инициализироваться напрямую из литералов (строк, чисел, массивов и т.д).\nНапример, благодаря ExpressibleByStringLiteral можно создать свой тип и присваивать ему строковый литерал без явного вызова инициализатора:\nlet x: MyString = \"Test\" вместо let x = MyString(stringLiteral: \"Test\") и т.д."}], "tasks": {"advanced": [{"id": "00000000-0000-0000-0000-000000000501", "category": "advanced", "title": "Параллельная загрузка", "description": "Необходимо реализовать метод loadDashboard таким образом, чтобы операции внутри него выполнялись параллельно", "starterJSONCode": ["func fetchUserData() async throws -> User { ... }", "func fetchUserPosts() async throws -> [Post] { ... }", "func loadDashboard() async throws -> [User: [Post]] { ... }"], "answerJSONCode": ["func loadDashboard() async throws -> [User: [Post]] {", "    async let user = fetchUserData()", "    async let posts = fetchUserPosts()", "", "    return try await [user: posts]", "}"]}, {"id": "00000000-0000-0000-0000-000000000502", "category": "advanced", "title": "Реализовать метод", "description": "Реализовать метод для поля поиска с учетом следующих условий:\n - не делать запрос на каждый ввод\n - ждать, пока пользователь перестанет печатать (500 мс)\n - игнорировать повторяющиеся значения\n - отменять предыдущий запрос при новом вводе", "starterJSONCode": ["func search(query: String) -> AnyPublisher<[String], Never> {}", "func bindSearch(", "    input: AnyPublisher<String, Never>", ") -> AnyPublisher<[String], Never> {", "   // TODO:", "}"], "answerJSONCode": ["func bindSearch(", "    input: AnyPublisher<String, Never>", ") -> AnyPublisher<[String], Never> {", "", "    input", "        .debounce(for: .milliseconds(500), scheduler: DispatchQueue.main)", "        .removeDuplicates()", "        .map { query in", "            search(query: query)", "        }", "        .switchToLatest()", "        .eraseToAnyPublisher()", "}"]}, {"id": "00000000-0000-0000-0000-000000000503", "category": "advanced", "title": "Реализовать метод", "description": "Написать реализацию incrementValue", "starterJSONCode": ["func incrementValue(_ initialValue: Int, step: Int) -> (() -> Int) {", "    // TODO:", "}", "", "let a = incrementValue(0, step: 10)", "a() // 0", "a() // 10", "a() // 20"], "answerJSONCode": ["func incrementValue(_ initialValue: Int, step: Int) -> (() -> Int) {", "    var result = initialValue", "    var action: () -> Int = {", "        defer {", "            result += step", "        }", "        return result", "    }", "", "    return action", "}"]}, {"id": "00000000-0000-0000-0000-000000000504", "category": "advanced", "title": "Рефакторинг", "description": "Исправить что бы функция работала (generic)", "starterJSONCode": ["protocol Returnable {", "    associatedtype Kind", "}", "", "func returnTheType(object: Returnable) -> Kind {", "    return nil", "}"], "answerJSONCode": ["protocol Returnable {", "    associatedtype Kind", "    func returnValue() -> Kind", "}", "", "func returnTheType<T: Returnable>(object: T) -> T.Kind? {", "    object.returnValue()", "}"]}, {"id": "00000000-0000-0000-0000-000000000505", "category": "advanced", "title": "Словарь Банк: ИНН", "description": "Написать реализацию Presenter, возвращающую словарь Банк: ИНН.", "starterJSONCode": ["   protocol BankServiceProtocol {", "       func loadBanksName (completion: @escaping ([String]) -> Void)", "", "       func loadINN(for name: String, completion: @escaping (Int) -> Void)", "   }", "", "     final class Presenter {", "     func loadData(completion: @escaping([String: Int]) -> Void)", "     }"], "answerJSONCode": ["final class Presenter {", "    let manager = BankManager()", "", "    func loadData(completion: @escaping([String: Int]) -> Void) {", "        var result: [String: Int] = [:]", "        let group = DispatchGroup()", "        let locker = NSLock()", "", "        DispatchQueue.global().async {", "            self.manager.loadBanksName { banks in", "                for bank in banks {", "                    group.enter()", "                    self.manager.loadINN(for: bank) { inn in", "                        locker.lock()", "                        result[bank] = inn", "                        locker.unlock()", "                        group.leave()", "                    }", "                }", "                group.notify(queue: .main) {", "                    let sorted = result.sorted { $0.key < $1.key }", "                    completion(result)", "                }", "            }", "        }", "    }", "}"]}], "integers": [{"id": "00000000-0000-0000-0000-000000000201", "category": "integers", "title": "Возведение одного числа в степень другого", "description": "Написать функцию, которая принимает два положительных числа и возводит первое число в степерь второго.", "answerJSONCode": ["func powered(number: Int, power: Int) -> Int {", "    guard number > 0 else { return 0 }", "    guard power > 0 else { return 1 }", "    var result = number", "    for i in 1...power {", "        result = result * number", "    }", "    return result", "}", "", "powered(number: 2, power: 6)"]}, {"id": "00000000-0000-0000-0000-000000000202", "category": "integers", "title": "Сложить числа в строке", "description": "Написать функцию, которая принимает строку, содержащую числа и буквы и возвращает сумму чисел в строке. Например, строка \"а12с3\" вернет число 6 (1 + 2 + 3).", "answerJSONCode": ["func sumNumbers(in line: String) -> Int {", "        var result = 0", "", "        for letter in line {", "            if let number = Int(String(letter)) {", "                result += number", "            }", "        }", "", "        return result", "}", "", "let numberedString = \"а12с3\"", "sumNumbers(in: numberedString)"]}, {"id": "00000000-0000-0000-0000-000000000203", "category": "integers", "title": "Повторения чисел в коллекции", "description": "Написать расширение для коллекций (тип данных: Int), возвращающее число раз, которое определенная цифра встречалась во всех числах коллекции. Например, [5, 15, 55, 515] repetition(digit: \"5\") вернет число 6.", "answerJSONCode": ["extension Collection where Iterator.Element == Int {", "   func repetition(of num: Int) -> Int {", "       var result = 0", "", "       for element in self {", "           let stringed = String(element)", "           for char in stringed {", "               if Int(String(char)) == num {", "                   result += 1", "               }", "           }", "       }", "       return result", "    }", "}", "", "[5, 15, 55, 515].repetition(of: 5)"]}, {"id": "00000000-0000-0000-0000-000000000204", "category": "integers", "title": "Сортировка коллекции по возрастанию до N", "description": "Написать расширение для коллекций, возвращающее N наименьших элементов, отсортированных по возрастанию, где N имеет тип данных Int. Например [1, 4, 3, 2]. sortUpToN вернет [1, 2, 3] если N = 3.", "answerJSONCode": ["extension Collection where Element == Int {", "    func sortUpToN(_ number: Int) -> [Int] {", "        self", "            .sorted()", "            .filter { $0 <= number }", "    }", "}", "", "let foo = [1, 4, 3, 2]", "print(foo.sortUpToN(3))"]}, {"id": "00000000-0000-0000-0000-000000000205", "category": "integers", "title": "Числа в строке", "description": "Задание: написать функцию, которая принимает строку и возвращает true если строка содержит только числа, например , цифры от 0 до 9", "answerJSONCode": ["func isNumber(in line: String) -> Bool {", "guard !line.isEmpty else { return false }", "return line.allSatisfy(\\.isNumber)", "}"]}], "methods": [{"id": "00000000-0000-0000-0000-000000000301", "category": "methods", "title": "Воссоздать метод reduce()", "description": "Написать расширение для коллекций, воссоздающее реализацию reduce().", "answerJSONCode": ["extension Collection {", "    func myReduce<T>(_ start: T, _ completion: (T, Element) throws -> T) rethrows -> T {", "        var result = start", "", "        for element in self {", "           result = try completion(result, element)", "        }", "", "        return result", "    }", "}"]}, {"id": "00000000-0000-0000-0000-000000000302", "category": "methods", "title": "Воссоздать метод map()", "description": "Написать расширение для коллекций, воссоздающее реализацию map().", "answerJSONCode": ["extension Collection {", "    func myMap<T>(_ transform: (Element) throws -> T) rethrows -> [T] {", "        var tranformedValues: [T] = []", "", "        for element in self {", "           try tranformedValues.append(transform(element))", "        }", "", "        return tranformedValues", "    }", "}"]}, {"id": "00000000-0000-0000-0000-000000000303", "category": "methods", "title": "Воссоздать метод firstIndex(of:)", "description": "Написать расширение для коллекций, которое воссоздает работу метода firstIndex(of:).", "answerJSONCode": ["extension Collection where Iterator.Element: Equatable {", "    func findFirstIndex(_ search: Iterator.Element) -> Int? {", "        for (index, element) in self.enumerated() {", "            if element == search {", "                return index", "            }", "        }", "", "        return nil", "    }", "}"]}, {"id": "00000000-0000-0000-0000-000000000304", "category": "methods", "title": "Воссоздать метод min()", "description": "Написать расширение для коллекций, которое воссоздает работу метода min().", "answerJSONCode": ["extension Collection where Element: Comparable {", "    func myMin() -> Element? {", "        let sorted = self.sorted()", "        guard let first = sorted.first else { return nil }", "        return first", "    }", "}"]}, {"id": "00000000-0000-0000-0000-000000000305", "category": "methods", "title": "Написать свой хит-тест", "description": "Написать собственную реализацию метода hitTest(_:with:) для UIView.", "answerJSONCode": ["extension UIView {", "    func myPoint(inside point: CGPoint, with event: UIEvent?) -> Bool {", "        return bounds.contains(point)", "    }", "", "    func myHitTest(_ point: CGPoint, with event: UIEvent?) -> UIView? {", "        guard isUserInteractionEnabled,", "              !isHidden,", "              alpha > 0.01", "        else {", "            return nil", "        }", "", "        guard myPoint(inside: point, with: event) else { return nil }", "", "        for subview in subviews.reversed() {", "            let convertedPoint = subview.convert(point, from: self)", "            if let hitView = subview.myHitTest(convertedPoint, with: event), {", "                return hitView", "            }", "        }", "", "        return self", "    }", "}"]}], "strings": [{"id": "00000000-0000-0000-0000-000000000101", "category": "strings", "title": "Вращение строки", "description": "Написать функцию, которая принимает две строки и возвращает true если одна строка является вращением другой, с учетом регистра(вращение строки - это когда мы берем буквы с конца строки и переносим их в начало, например строка \"swift\", при вращении на 2 символа станет строкой \"ftswi\").", "answerJSONCode": ["func revolveString(_ line: String, revolver: String) -> Bool {", "    guard line.count == revolver.count else { return false }", "    let combined = line + line", "    return combined.contains(revolver)", "}", "", "revolveString(\"Hello\", revolver: \"lloHe\")"]}, {"id": "00000000-0000-0000-0000-000000000102", "category": "strings", "title": "Идентичны ли две строки между собой", "description": "Написать функцию, которая принимает две строки и возвращает true если эти строки содержат одни и те же символы в любом порядке с учетом регистра.", "answerJSONCode": ["func equalityCheck(string1: String, string2: String) -> Bool {", "    string1.sorted() == string2.sorted()", "}", "", "equalityCheck(string1: \"a1B1\", string2: \"B1a1\")"]}, {"id": "00000000-0000-0000-0000-000000000103", "category": "strings", "title": "Сколько раз символ встречается в строке", "description": "Написать функцию, которая принимает строку и символ, а далее возвращает количество раз, которое данный символ встречается в строке, с учетом регистра.", "answerJSONCode": ["func symbolCheck(_ line: String, _ char: Character) -> Int {", "   line.reduce(0) { $1 == char ? $0 + 1 : $0 }", "}", "", "let word = \"Hello world!\"", "symbolCheck(word, \"l\")"]}, {"id": "00000000-0000-0000-0000-000000000104", "category": "strings", "title": "Сокращение количества пробелов до одного", "description": "Написать функцию, которая принимает строку как свой единственный параметр и возвращает ту же самую строку только с замененными множественными пробелами на единичный пробел (например строка \"[space] [space] [space]a\" вернется в виде \"[space]a\").", "answerJSONCode": ["func removeExtraSpaces(in line: String) -> String {", "    line", "        .components(separatedBy: .whitespaces)", "        .filter { !$0.isEmpty }", "        .joined(separator: \" \")", "}", "let spacedString = \"Hello   world\"", "print(removeExtraSpaces(in: spacedString))"]}, {"id": "00000000-0000-0000-0000-000000000105", "category": "strings", "title": "Является ли строка панграммой", "description": "Написать функцию, которая принимает строку и возвращает true если эта строка является панграммой, игнорируя регист (панграмма - фраза, содержащая в себе все буквы алфавита. Их используют для презентации шрифтов, чтобы можно было в одной фразе рассмотреть все элементы. Например: \"аэрофотосьёмка ландшафта уже выявила земли богачей и процветающих крестьян\", \"The quick brown fox jumps over the lazy dog\").", "answerJSONCode": ["func pangramCheck(_ line: String) -> Bool {", "    var set = Set(line.lowercased())", "    let letters = set.filter { $0 != \" \"}", "    return letters.count == 26", "}", "", "let pangram = \"The quick brown fox jumps over the lazy dog\"", "pangramCheck(pangram)"]}], "standard": [{"id": "00000000-0000-0000-0000-000000000401", "category": "standard", "title": "Рефакторинг", "description": "Что не так и почему? Исправить.", "starterJSONCode": ["class Service {", "    func getData (completion: @escaping (String) -> Void) {", "        DispatchQueue.main.asyncAfter(deadline: .now() + 20.0) {", "            completion (\"Hello world\")", "        }", "    }", "}", "class ViewController: UIViewController {", "    let service = Service()", "    let label = UILabel()", "", "    override func viewDidLoad() {", "        super.viewDidLoad()", "        service.getData { [unowned self] (data) in", "            self.label.text = data", "        }", "    }", "}"], "answerJSONCode": ["Использование unowned self предполагает, что контроллер будет жить на момент обращения по ссылке, однако мы не можем этого гарантировать из-за долгой работы сервиса, поэтому можем получить краш при выполнении замыкания, если пользователь уже закрыл экран. Необходимо поставить weak self и ввести проверку валидности self, т.е. жив ли контроллер на момент выполнения замыкания, если нет, то выходим из метода.", "", "override func viewDidLoad() {", "    super.viewDidLoad()", "    service.getData { [weak self] (data) in", "        guard let self = self else { return }", "        self.label.text = data", "    }", "}"]}, {"id": "00000000-0000-0000-0000-000000000402", "category": "standard", "title": "Рефакторинг", "description": "Оптимизировать функцию bestAnimals", "starterJSONCode": ["let animalsInfo = [", "\"Fishes\": [\"Seabass\", \"Lion Fish\", \"Tuna\"],", "\"Farm animals\": [\"Sheep\", \"Chicken\", \"Goat\"],", "\"Home animals\": [\"Dog\", \"Cat\", \"Tiger\"]", "]", "func bestAnimals(from animalsInfo: [String : [String]]) -> [String] {", "    var animals: let userName = '';

// ── UTILS ──────────────────────────────────────────────────────────
function esc(s){ if(!s)return''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b; }
function pick(a,n){ return shuffle(a).slice(0,Math.min(n,a.length)); }

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

function updateProgress(){
  const pct = totalCards>0 ? Math.round(checked.size/totalCards*100) : 0;
  document.getElementById('progLabel').textContent=checked.size+' / '+totalCards;
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';
}

// ── SWIFT SYNTAX HIGHLIGHT ─────────────────────────────────────────
function highlightSwift(code){
  const keywords = /\b(let|var|func|class|struct|enum|protocol|extension|import|return|if|else|guard|for|in|while|switch|case|default|break|continue|fallthrough|throw|throws|try|catch|init|deinit|self|super|override|final|static|lazy|weak|unowned|mutating|inout|defer|where|associatedtype|typealias|some|any|async|await|actor|true|false|nil|public|private|internal|fileprivate|open)\b/g;
  const types    = /\b([A-Z][A-Za-z0-9]*)\b/g;
  const strings  = /("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g;
  const nums     = /\b(\d+\.?\d*)\b/g;
  const comments = /(\/\/.*$)/gm;

  let escaped = esc(code);
  // order matters
  escaped = escaped.replace(strings,  m=>'<span class="sw-str">'+m+'</span>');
  escaped = escaped.replace(comments, m=>'<span class="sw-cm">'+m+'</span>');
  escaped = escaped.replace(keywords, m=>'<span class="sw-kw">'+m+'</span>');
  escaped = escaped.replace(types,    m=>'<span class="sw-type">'+m+'</span>');
  escaped = escaped.replace(nums,     m=>'<span class="sw-num">'+m+'</span>');
  return escaped;
}

// ── START ──────────────────────────────────────────────────────────
function startSession(){
  const name = document.getElementById('nameInput').value.trim();
  if(!name){ toast('Введи имя!'); return; }
  userName = name;

  session.warmup = pick(DATA.warmup, 11);
  session.theory = pick(DATA.theory, 7);
  session.tasks  = Object.values(DATA.tasks).map(arr=>pick(arr,1)[0]).filter(Boolean);

  checked = new Set();
  userAnswers = {};
  totalCards = session.warmup.length + session.theory.length + session.tasks.length;

  document.getElementById('sessName').textContent = userName;
  renderSession();
  showScreen('s-session');
  updateProgress();
}

// ── RENDER SESSION ─────────────────────────────────────────────────
function renderSection(icon, label, count){
  const d=document.createElement('div');
  d.innerHTML=`<div class="section-hd">
    <span>${icon}</span>
    <span class="section-hd-title">${label}</span>
    <span class="section-hd-count">${count} вопросов</span>
  </div>`;
  return d;
}

function renderSession(){
  const body = document.getElementById('sessBody');
  body.innerHTML='';

  // WARMUP
  body.appendChild(renderSection('🔥','Warmup',session.warmup.length));
  session.warmup.forEach((q,i)=>{
    const code = q.questionJSONCode ? `<pre class="code-pre">${highlightSwift(q.questionJSONCode.join('\n'))}</pre>` : '';
    const card = document.createElement('div');
    card.className='qcard'; card.id='qc-'+q.id;
    card.innerHTML=`
      <div class="qcard-top">
        <div class="qnum">${i+1}</div>
        <div class="qtext">${esc(q.question)}</div>
      </div>
      ${code}
      <div class="editor-wrap">
        <div class="editor-label">
          <span>// Твой ответ (Swift)</span>
          <span style="color:var(--muted);font-size:9px">Tab = 4 пробела</span>
        </div>
        <div class="swift-editor-container">
          <textarea class="swift-editor" id="ed-${q.id}" spellcheck="false" autocorrect="off" autocapitalize="off"
            placeholder="// Пиши ответ здесь..."
            oninput="saveAnswer('${q.id}',this.value)"
            onkeydown="handleTab(event)"></textarea>
        </div>
      </div>
      <div class="mark-row">
        <div class="mark-chk" id="chk-${q.id}" onclick="toggleDone('${q.id}')"></div>
        <span class="mark-label" onclick="toggleDone('${q.id}')">Отметить как выполненное</span>
      </div>`;
    body.appendChild(card);
  });

  // THEORY
  const tDiv=document.createElement('div'); tDiv.style.marginTop='24px';
  tDiv.appendChild(renderSection('📚','Theory',session.theory.length));
  session.theory.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='qcard'; card.id='qc-'+q.id;
    card.innerHTML=`
      <div class="qcard-top">
        <div class="qnum">${i+1}</div>
        <div class="qtext">${esc(q.question)}</div>
      </div>
      <div class="text-answer-wrap">
        <div class="text-answer-label">
          <span>// Твой ответ</span>
        </div>
        <textarea class="text-answer" id="ed-${q.id}" spellcheck="true"
          placeholder="Напиши свой ответ здесь..."
          oninput="saveAnswer('${q.id}',this.value)"></textarea>
      </div>
      <div class="mark-row">
        <div class="mark-chk" id="chk-${q.id}" onclick="toggleDone('${q.id}')"></div>
        <span class="mark-label" onclick="toggleDone('${q.id}')">Отметить как выполненное</span>
      </div>`;
    tDiv.appendChild(card);
  });
  body.appendChild(tDiv);

  // TASKS
  const tkDiv=document.createElement('div'); tkDiv.style.marginTop='24px';
  tkDiv.appendChild(renderSection('💻','Coding Tasks',session.tasks.length));
  session.tasks.forEach((t,i)=>{
    const starter = t.starterJSONCode ? t.starterJSONCode.join('\n') : '';
    const starterBlock = starter ? `
      <div class="starter-label">// Стартовый код</div>
      <pre class="code-pre">${highlightSwift(starter)}</pre>` : '';

    const card=document.createElement('div');
    card.className='tcard'; card.id='qc-'+t.id;
    card.innerHTML=`
      <div class="tcard-top">
        <span class="tbadge badge-${t.category}">${t.category}</span>
        <div>
          <div class="ttitle">${esc(t.title)}</div>
          <div class="tdesc">${esc(t.description)}</div>
        </div>
      </div>
      ${starterBlock}
      <div class="editor-wrap">
        <div class="editor-label">
          <span>// Твоё решение (Swift)</span>
          <span style="color:var(--muted);font-size:9px">Tab = 4 пробела</span>
        </div>
        <div class="swift-editor-container">
          <textarea class="swift-editor" id="ed-${t.id}" spellcheck="false" autocorrect="off" autocapitalize="off"
            placeholder="// Пиши код здесь..."
            oninput="saveAnswer('${t.id}',this.value)"
            onkeydown="handleTab(event)"></textarea>
        </div>
      </div>
      <div class="mark-row">
        <div class="mark-chk" id="chk-${t.id}" onclick="toggleDone('${t.id}')"></div>
        <span class="mark-label" onclick="toggleDone('${t.id}')">Отметить как выполненное</span>
      </div>`;
    tkDiv.appendChild(card);
  });
  body.appendChild(tkDiv);

  // bottom padding
  const pad=document.createElement('div'); pad.style.height='40px';
  body.appendChild(pad);
}

// ── INTERACTIONS ───────────────────────────────────────────────────
function toggleDone(id){
  if(checked.has(id)){ checked.delete(id); }
  else { checked.add(id); }
  const card = document.getElementById('qc-'+id);
  const chk  = document.getElementById('chk-'+id);
  if(card){ card.classList.toggle('done', checked.has(id)); }
  if(chk) { chk.classList.toggle('checked', checked.has(id)); }
  updateProgress();
}

function saveAnswer(id, val){ userAnswers[id] = val; }

function handleTab(e){
  if(e.key==='Tab'){
    e.preventDefault();
    const ta=e.target, s=ta.selectionStart, en=ta.selectionEnd;
    ta.value=ta.value.substring(0,s)+'    '+ta.value.substring(en);
    ta.selectionStart=ta.selectionEnd=s+4;
  }
}

function confirmFinish(){
  if(confirm('Завершить сессию и перейти к результатам?')) finishSession();
}

// ── FINISH ─────────────────────────────────────────────────────────
function finishSession(){
  const wDone = session.warmup.filter(q=>checked.has(q.id)).length;
  const tDone = session.theory.filter(q=>checked.has(q.id)).length;
  const kDone = session.tasks.filter(t=>checked.has(t.id)).length;
  const pct   = totalCards>0 ? Math.round(checked.size/totalCards*100) : 0;

  let emoji='🎯', title='Сессия завершена!', sub='';
  if(pct===100){emoji='🏆';title='Идеально!';sub='Все вопросы отмечены выполненными ✓';}
  else if(pct>=70){emoji='💪';sub=pct+'% выполнено — отличная работа!';}
  else if(pct>=40){emoji='📈';sub=pct+'% выполнено — есть куда расти!';}
  else{emoji='🌱';sub=pct+'% выполнено — продолжай тренироваться!';}

  document.getElementById('resEmoji').textContent=emoji;
  document.getElementById('resTitle').textContent=title;
  document.getElementById('resSub').textContent=sub;
  document.getElementById('r-checked').textContent=checked.size;
  document.getElementById('r-total').textContent=totalCards;
  document.getElementById('r-warmup').textContent=wDone+'/'+session.warmup.length;
  document.getElementById('r-theory').textContent=tDone+'/'+session.theory.length;

  showScreen('s-result');
  sendTelegram(wDone, tDone, kDone, pct);
}

// ── ANSWERS SCREEN ─────────────────────────────────────────────────
function showAnswers(){
  const body=document.getElementById('answersBody');
  body.innerHTML='';

  const allItems=[
    ...session.warmup.map(q=>({...q,_type:'warmup'})),
    ...session.theory.map(q=>({...q,_type:'theory'})),
    ...session.tasks.map(t=>({...t,_type:'task'}))
  ];

  // section labels
  const sections={warmup:'🔥 Warmup',theory:'📚 Theory',task:'💻 Coding Tasks'};
  let lastType='';

  allItems.forEach((item,i)=>{
    if(item._type!==lastType){
      lastType=item._type;
      const sh=document.createElement('div');
      sh.style.cssText='margin:24px 0 12px;';
      sh.innerHTML=`<div class="section-hd"><span class="section-hd-title">${sections[item._type]}</span></div>`;
      body.appendChild(sh);
    }

    const isDone=checked.has(item.id);
    const card=document.createElement('div');
    card.className='acard'+(isDone?' done-card':'');
    card.id='ac-'+item.id;

    const code = item.questionJSONCode ? `<pre class="code-pre">${highlightSwift(item.questionJSONCode.join('\n'))}</pre>` : '';
    const starter = item.starterJSONCode ? `
      <div class="starter-label">// Стартовый код</div>
      <pre class="code-pre">${highlightSwift(item.starterJSONCode.join('\n'))}</pre>` : '';

    const userAns = userAnswers[item.id];
    const userBlock = (userAns && userAns.trim()) ? `
      <div class="user-answer-lbl">// Твой ответ</div>
      <div class="user-answer-txt">${esc(userAns)}</div>` : '';

    const answerContent = item.answer || (item.answerJSONCode ? item.answerJSONCode.join('\n') : '');
    const answerBlock = answerContent ? `
      <div class="answer-lbl">// Правильный ответ</div>
      <div class="answer-txt">${esc(answerContent)}</div>` : '';

    const qText = item.question || item.description || item.title || '';
    const badge = item.category ? `<span class="tbadge badge-${item.category}" style="margin-top:1px">${item.category}</span>` : '';
    const doneTag = isDone ? '<span style="font-size:10px;color:var(--accent3);margin-left:auto;flex-shrink:0">✓ выполнено</span>' : '';

    card.innerHTML=`
      <div class="acard-top" onclick="toggleAcard('${item.id}')">
        ${badge}
        <div style="flex:1;font-size:13px;line-height:1.5">${esc(qText)}</div>
        ${doneTag}
        <div class="acard-chevron">▼</div>
      </div>
      <div class="acard-body">
        ${code}${starter}
        ${userBlock}
        ${answerBlock}
      </div>`;
    body.appendChild(card);
  });

  const pad=document.createElement('div'); pad.style.height='40px';
  body.appendChild(pad);
  showScreen('s-answers');
}

function toggleAcard(id){
  const c=document.getElementById('ac-'+id);
  if(c) c.classList.toggle('open');
}

// ── TELEGRAM ───────────────────────────────────────────────────────
async function sendTelegram(wDone,tDone,kDone,pct){
  const now=new Date().toLocaleString('ru-RU',{timeZone:'Europe/Moscow'});
  const bar='█'.repeat(Math.round(pct/10))+'░'.repeat(10-Math.round(pct/10));
  const comment=pct===100?'🏆 Идеально!':pct>=80?'💪 Отличная подготовка!':pct>=60?'📈 Хороший результат.':pct>=40?'🌱 Продолжай тренироваться!':'📖 Нужно больше практики.';

  const msg=`🦅 *iOS Interview Trainer*\n\n`+
    `👤 *${userName}*\n📅 ${now} MSK\n\n`+
    `${bar} ${pct}%\n\n`+
    `🔥 Warmup: ${wDone}/${session.warmup.length}\n`+
    `📚 Theory: ${tDone}/${session.theory.length}\n`+
    `💻 Tasks: ${kDone}/${session.tasks.length}\n`+
    `✅ Итого: ${checked.size}/${totalCards}\n\n${comment}`;

  try{
    const r=await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:CHAT_ID,text:msg,parse_mode:'Markdown'})
    });
    const d=await r.json();
    document.getElementById('tgNote').textContent=d.ok?'✅ Результаты отправлены в Telegram!':'⚠️ Не удалось отправить результаты.';
  }catch(e){
    document.getElementById('tgNote').textContent='⚠️ Ошибка отправки.';
  }
}

}
