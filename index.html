<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS Interview Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a40;
  --accent: #6c63ff;
  --accent2: #ff6b6b;
  --accent3: #43e97b;
  --text: #e8e8f0;
  --muted: #6b6b8a;
  --code-bg: #0d0d17;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none; z-index:0;
}

/* ── SCREENS ── */
.screen { display:none; position:relative; z-index:1; min-height:100vh; }
.screen.active { display:flex; flex-direction:column; }

/* ── WELCOME ── */
#s-welcome {
  align-items:center; justify-content:center;
  padding:40px 20px; text-align:center;
}
.logo-ring {
  width:100px; height:100px; border-radius:50%;
  border:3px solid var(--accent);
  display:flex; align-items:center; justify-content:center;
  margin-bottom:32px; position:relative;
  animation: spin 8s linear infinite;
}
.logo-ring::before {
  content:''; position:absolute; inset:-6px; border-radius:50%;
  border:2px dashed rgba(108,99,255,0.3);
  animation: spin 6s linear infinite reverse;
}
.logo-icon { font-size:40px; animation: spin 8s linear infinite reverse; }
@keyframes spin { to { transform:rotate(360deg); } }

.welcome-title {
  font-family:'Unbounded',sans-serif;
  font-size:clamp(26px,6vw,50px); font-weight:900; line-height:1.1;
  background:linear-gradient(135deg,#fff 0%,var(--accent) 60%,var(--accent2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; margin-bottom:16px;
}
.welcome-sub { color:var(--muted); font-size:13px; margin-bottom:40px; line-height:1.7; }
.stats-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:12px; max-width:400px; width:100%; margin-bottom:32px;
}
.stat-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:16px; text-align:center;
}
.stat-num { font-family:'Unbounded',sans-serif; font-size:22px; font-weight:700; color:var(--accent); }
.stat-label { font-size:10px; color:var(--muted); margin-top:4px; }

.name-form { display:flex; flex-direction:column; gap:14px; width:100%; max-width:400px; }
.field-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.name-input {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:12px; padding:16px 20px;
  font-family:'JetBrains Mono',monospace; font-size:15px; color:var(--text); outline:none;
  transition:border-color 0.2s;
}
.name-input:focus { border-color:var(--accent); }
.name-input::placeholder { color:var(--muted); }

/* ── BUTTONS ── */
.btn {
  padding:14px 32px; border-radius:12px;
  font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700;
  cursor:pointer; border:none; transition:all 0.2s; letter-spacing:0.5px;
}
.btn-primary {
  background:var(--accent); color:#fff;
  box-shadow:0 0 30px rgba(108,99,255,0.3);
}
.btn-primary:hover { background:#7b74ff; transform:translateY(-1px); }
.btn-primary:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.btn-ghost {
  background:transparent; color:var(--muted);
  border:1px solid var(--border);
}
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
.btn-success {
  background:var(--accent3); color:#000;
  box-shadow:0 0 20px rgba(67,233,123,0.25);
}
.btn-success:hover { background:#5cf592; transform:translateY(-1px); }

/* ── SESSION HEADER ── */
.session-header {
  position:sticky; top:0; z-index:10;
  background:rgba(10,10,15,0.92); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:14px 24px;
  display:flex; align-items:center; gap:16px; flex-shrink:0;
}
.session-name {
  font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700;
  color:var(--accent); white-space:nowrap;
}
.prog-wrap { flex:1; display:flex; flex-direction:column; gap:4px; }
.prog-info { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); }
.prog-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.prog-fill {
  height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px; transition:width 0.4s ease;
}
.end-btn {
  background:transparent; border:1px solid var(--border); color:var(--muted);
  padding:8px 14px; border-radius:8px;
  font-family:'JetBrains Mono',monospace; font-size:10px;
  cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.end-btn:hover { border-color:var(--accent2); color:var(--accent2); }

/* ── SESSION BODY ── */
.session-body { padding:24px; max-width:800px; margin:0 auto; width:100%; }

.section-hd {
  display:flex; align-items:center; gap:12px;
  padding:14px 18px; background:var(--surface);
  border:1px solid var(--border); border-radius:12px;
  border-left:3px solid var(--accent); margin-bottom:16px; margin-top:8px;
}
.section-hd-title {
  font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700;
  text-transform:uppercase; letter-spacing:1px; color:var(--accent);
}
.section-hd-count { font-size:10px; color:var(--muted); margin-left:auto; }

/* ── QUESTION CARDS ── */
.qcard {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; margin-bottom:10px; overflow:hidden;
  transition:border-color 0.2s;
}
.qcard:hover { border-color:rgba(108,99,255,0.35); }
.qcard.done { border-color:rgba(67,233,123,0.35); }

.qcard-top {
  padding:16px 18px;
  display:flex; align-items:flex-start; gap:12px;
}
.qnum {
  width:26px; height:26px; border-radius:7px;
  background:var(--surface2); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:var(--muted); flex-shrink:0;
}
.qcard.done .qnum {
  background:rgba(67,233,123,0.1); border-color:rgba(67,233,123,0.4); color:var(--accent3);
}
.qtext { font-size:13px; line-height:1.6; flex:1; }

.code-pre {
  background:var(--code-bg); border-top:1px solid var(--border);
  padding:14px 18px; font-size:12px; line-height:1.7;
  overflow-x:auto; white-space:pre; color:#a9b1d6;
}

/* Swift syntax highlight */
.sw-kw { color:#c792ea; }
.sw-str { color:#c3e88d; }
.sw-num { color:#f78c6c; }
.sw-cm { color:#546e7a; font-style:italic; }
.sw-type { color:#82aaff; }
.sw-fn { color:#82aaff; }

.mark-row {
  padding:12px 18px; border-top:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.mark-chk {
  width:18px; height:18px; border-radius:5px;
  border:2px solid var(--border); background:transparent;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.2s;
}
.mark-chk.checked { background:var(--accent3); border-color:var(--accent3); }
.mark-chk.checked::after { content:'✓'; font-size:11px; color:#000; font-weight:700; }
.mark-label { font-size:11px; color:var(--muted); cursor:pointer; }
.qcard.done .mark-label { color:var(--accent3); }

/* ── TASK CARDS ── */
.tcard {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; margin-bottom:10px; overflow:hidden;
}
.tcard:hover { border-color:rgba(108,99,255,0.35); }
.tcard.done { border-color:rgba(67,233,123,0.35); }
.tcard-top { padding:16px 18px; display:flex; align-items:flex-start; gap:12px; }
.tbadge {
  padding:3px 9px; border-radius:20px; font-size:9px;
  font-weight:600; letter-spacing:0.5px; text-transform:uppercase; flex-shrink:0; margin-top:2px;
}
.badge-strings  { background:rgba(255,107,107,.15); color:#ff6b6b; border:1px solid rgba(255,107,107,.3); }
.badge-integers { background:rgba(108,99,255,.15); color:#8b83ff; border:1px solid rgba(108,99,255,.3); }
.badge-methods  { background:rgba(67,233,123,.15); color:#43e97b; border:1px solid rgba(67,233,123,.3); }
.badge-standard { background:rgba(255,193,7,.15);  color:#ffc107; border:1px solid rgba(255,193,7,.3); }
.badge-advanced { background:rgba(233,67,67,.15);  color:#e94343; border:1px solid rgba(233,67,67,.3); }

.ttitle { font-size:13px; font-weight:600; }
.tdesc  { font-size:11px; color:var(--muted); margin-top:4px; line-height:1.6; }

.editor-wrap { border-top:1px solid var(--border); }
.editor-label {
  padding:8px 18px; font-size:9px; letter-spacing:2px;
  text-transform:uppercase; color:var(--muted);
  background:var(--code-bg); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.editor-label span { color:var(--accent); }

/* Swift editor textarea */
.swift-editor-container { position:relative; background:var(--code-bg); }
.swift-editor {
  width:100%; min-height:160px;
  background:transparent; color:#e8e8f0;
  border:none; outline:none; resize:vertical;
  padding:14px 18px;
  font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.7;
  tab-size:4;
  position:relative; z-index:2;
  caret-color:#fff;
}

.starter-label {
  padding:8px 18px; font-size:9px; letter-spacing:2px;
  text-transform:uppercase; color:var(--accent3);
  background:var(--code-bg); border-top:1px solid var(--border); border-bottom:1px solid var(--border);
}

/* ── TEXT ANSWER AREA (Theory / Warmup) ── */
.text-answer-wrap { border-top:1px solid var(--border); }
.text-answer-label {
  padding:8px 18px; font-size:9px; letter-spacing:2px;
  text-transform:uppercase; color:var(--muted);
  background:var(--surface2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.text-answer-label span:first-child { color:var(--accent); }
.text-answer {
  width:100%; min-height:80px;
  background:var(--surface2); color:var(--text);
  border:none; outline:none; resize:vertical;
  padding:14px 18px;
  font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.7;
  caret-color:#fff;
}
.text-answer::placeholder { color:var(--muted); font-style:italic; }
.text-answer:focus { background:rgba(26,26,38,0.95); }

/* ── RESULT SCREEN ── */
#s-result {
  align-items:center; justify-content:center;
  padding:40px 20px; text-align:center;
}
.result-emoji { font-size:64px; margin-bottom:20px; }
.result-title {
  font-family:'Unbounded',sans-serif;
  font-size:clamp(20px,5vw,36px); font-weight:900;
  background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; margin-bottom:10px;
}
.result-sub { color:var(--muted); font-size:12px; margin-bottom:32px; }
.result-grid {
  display:grid; grid-template-columns:repeat(2,1fr);
  gap:12px; max-width:380px; width:100%; margin-bottom:32px;
}
.rstat {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:18px; text-align:center;
}
.rstat-num { font-family:'Unbounded',sans-serif; font-size:26px; font-weight:700; color:var(--accent); }
.rstat-label { font-size:10px; color:var(--muted); margin-top:5px; }
.tg-note {
  font-size:11px; color:var(--muted); margin-bottom:24px;
  padding:10px 18px; background:var(--surface);
  border:1px solid var(--border); border-radius:10px; max-width:380px;
}
.btn-row { display:flex; flex-direction:column; gap:10px; align-items:center; }

/* ── ANSWERS SCREEN ── */
#s-answers { flex-direction:column; }
.answers-header {
  position:sticky; top:0; z-index:10;
  background:rgba(10,10,15,0.92); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:14px 24px; display:flex; align-items:center; gap:16px; flex-shrink:0;
}
.answers-title {
  font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700; color:var(--accent3);
}
.answers-body { padding:24px; max-width:800px; margin:0 auto; width:100%; }

.acard {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; margin-bottom:10px; overflow:hidden;
}
.acard.done-card { border-color:rgba(67,233,123,0.3); }
.acard-top {
  padding:14px 18px; cursor:pointer;
  display:flex; align-items:flex-start; gap:12px;
}
.acard-chevron {
  font-size:11px; color:var(--muted); flex-shrink:0;
  margin-top:3px; transition:transform 0.3s;
}
.acard.open .acard-chevron { transform:rotate(180deg); }
.acard-body { display:none; }
.acard.open .acard-body { display:block; }
.answer-lbl {
  padding:10px 18px; font-size:9px; letter-spacing:2px;
  text-transform:uppercase; color:var(--accent3);
  background:var(--code-bg); border-top:1px solid var(--border);
}
.answer-txt {
  padding:14px 18px; font-size:12px; line-height:1.8;
  color:#c8c8e0; white-space:pre-wrap;
  border-top:1px solid var(--border);
}
.user-answer-lbl {
  padding:10px 18px; font-size:9px; letter-spacing:2px;
  text-transform:uppercase; color:var(--accent);
  background:var(--code-bg); border-top:1px solid var(--border);
}
.user-answer-txt {
  padding:14px 18px; font-size:12px; line-height:1.8;
  color:#a9b1d6; white-space:pre-wrap; font-family:'JetBrains Mono',monospace;
  border-top:1px solid var(--border);
}

/* ── TOAST ── */
.toast {
  position:fixed; bottom:24px; right:24px;
  background:var(--surface2); border:1px solid var(--accent);
  border-radius:12px; padding:12px 18px; font-size:12px; color:var(--text);
  z-index:200; transform:translateY(80px); opacity:0; transition:all 0.3s;
}
.toast.show { transform:translateY(0); opacity:1; }
</style>
</head>
<body>

<!-- ── SCREEN 1: WELCOME ── -->
<div id="s-welcome" class="screen active">
  <div class="logo-ring"><span class="logo-icon">🦅</span></div>
  <h1 class="welcome-title">iOS Interview<br>Trainer</h1>
  <p class="welcome-sub">Тренажёр для подготовки к собеседованиям.<br>Warmup · Theory · Coding Tasks</p>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num">55</div><div class="stat-label">Warmup</div></div>
    <div class="stat-card"><div class="stat-num">35</div><div class="stat-label">Theory</div></div>
    <div class="stat-card"><div class="stat-num">25</div><div class="stat-label">Tasks</div></div>
  </div>
  <div class="name-form">
    <div>
      <div class="field-label">Твоё имя</div>
      <input class="name-input" id="nameInput" type="text" placeholder="Введи имя..." autocomplete="off"/>
    </div>
    <button class="btn btn-primary" id="startBtn" onclick="startSession()">Начать сессию →</button>
  </div>
</div>

<!-- ── SCREEN 2: SESSION ── -->
<div id="s-session" class="screen">
  <div class="session-header">
    <div class="session-name" id="sessName">—</div>
    <div class="prog-wrap">
      <div class="prog-info">
        <span id="progLabel">0 / 0</span>
        <span id="progPct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <button class="end-btn" onclick="confirmFinish()">Завершить</button>
  </div>
  <div class="session-body" id="sessBody"></div>
</div>

<!-- ── SCREEN 3: RESULT ── -->
<div id="s-result" class="screen">
  <div class="result-emoji" id="resEmoji">🎯</div>
  <h2 class="result-title" id="resTitle">Сессия завершена!</h2>
  <p class="result-sub" id="resSub"></p>
  <div class="result-grid">
    <div class="rstat"><div class="rstat-num" id="r-checked">0</div><div class="rstat-label">Отмечено</div></div>
    <div class="rstat"><div class="rstat-num" id="r-total">0</div><div class="rstat-label">Всего</div></div>
    <div class="rstat"><div class="rstat-num" id="r-warmup">0</div><div class="rstat-label">Warmup</div></div>
    <div class="rstat"><div class="rstat-num" id="r-theory">0</div><div class="rstat-label">Theory</div></div>
  </div>
  <div class="tg-note" id="tgNote">📬 Отправляю результаты...</div>
  <div class="btn-row">
    <button class="btn btn-success" onclick="showAnswers()">Посмотреть ответы →</button>
    <button class="btn btn-ghost" onclick="newSession()">Новая сессия</button>
  </div>
</div>

<!-- ── SCREEN 4: ANSWERS ── -->
<div id="s-answers" class="screen">
  <div class="answers-header">
    <div class="answers-title">📖 Разбор ответов</div>
    <div style="margin-left:auto;display:flex;gap:10px;">
      <button class="end-btn" onclick="newSession()">Новая сессия</button>
      <button class="end-btn" style="border-color:var(--accent);color:var(--accent)" onclick="showScreen('s-welcome')">На главную</button>
    </div>
  </div>
  <div class="answers-body" id="answersBody"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const DATA = {"warmup": [{"id": "00000001-0000-0000-0000-000000000001", "question": "Скомпилируется ли данный код?\n", "questionJSONCode": ["let i = 3", "switch i {", "case 1:", "    print (\"Number 1\")", "case 2:", "    print (\"Number 2\")", "case 3:", "    print (\"Number 3\")", "}"], "answer": "Нет, отсутствует default case."}, {"id": "00000002-0000-0000-0000-000000000002", "question": "Скомпилируется ли данный код? Если да, то что будет являться результатом его выполнения?}", "questionJSONCode": ["let names = [\"Mark\", \"Mary\"]", "for name in names {", "   name = name.uppercased()", "    print(\"HELLO, \\(name)!\")", "}"], "answer": "Не скомпилируется, так как name является константой цикла."}, {"id": "00000003-0000-0000-0000-000000000003", "question": "Скомпилируется ли данный код? Если да, то что будет являться результатом его выполнения?", "questionJSONCode": ["let names = [\"Anna\", \"Maria\"]", "for i in 0...names.length {", "    print (\"Hello, \\(names[i])!\")", "}"], "answer": "Не скомпилируется. Чтобы скомпилировался диапазон д.б. 0..<names.count."}, {"id": "00000004-0000-0000-0000-000000000004", "question": "Скомпилируется ли данный код?", "questionJSONCode": ["var i = 2", "do {", "   print (i)", "   i *= 2", "} while (i < 128)"], "answer": "Не скомпилируется, так как в Swift нет цикла do/while."}, {"id": "00000005-0000-0000-0000-000000000005", "question": "Скомпилируется ли данный код?", "questionJSONCode": ["class Dog {", "   var breed: String", "   var age: Int", "}", "", "let snoopy = Dog(breed: \"Bulldog\", age: 3)", "print (snoopy.breed)"], "answer": "Не скомпилируется, так как в классе нет инициализатора."}, {"id": "00000006-0000-0000-0000-000000000006", "question": "Безопасно ли использовать unowned в данном коде? Объясните почему.", "questionJSONCode": ["class Customer {", "    var card: CreditCard?", "}", "", "class CreditCard {", "    unowned let customer: Customer", "", "    init(customer: Customer) {", "        self.customer = customer", "    }", "}", "", "var customer: Customer? = Customer()", "customer?.card = CreditCard(customer: customer!)", "", "customer = nil"], "answer": "Использование unowned здесь безопасно. Объект CreditCard принадлежит объекту Customer и хранится в его свойстве card. Когда переменная customer устанавливается в nil, объект Customer деаллоцируется. Вместе с ним деаллоцируется и CreditCard, потому что на него больше нет сильных ссылок.\n\nТак как CreditCard уничтожается одновременно с Customer, ссылка unowned не будет использована после освобождения объекта, поэтому runtime crash не произойдёт.\n\nЗдесь важно понимать жизненный цикл объектов: CreditCard не может существовать без Customer, и Customer владеет CreditCard. В таких отношениях unowned является корректным выбором, так как он не создаёт retain cycle и не требует optional, как weak."}, {"id": "00000007-0000-0000-0000-000000000007", "question": "Скомпилируется ли данный код?", "questionJSONCode": ["let first = [\"1\", \"2\"]", "let second = [\"3\", \"4\"]", "let third = first + second"], "answer": "Скомпилируется."}, {"id": "00000008-0000-0000-0000-000000000008", "question": "Скомпилируется ли данный код?", "questionJSONCode": ["let rounded: Int = round(10.5)", "print(\"Rounding 10.5 makes \\(rounded)\")"], "answer": "Не скомпилируется, так как round возвращает Double."}, {"id": "00000009-0000-0000-0000-000000000009", "question": "Скомпилируется ли данный код?", "questionJSONCode": ["let possibleNumber = \"1701\"", "let convertedNumber = Int(possibleNumber)"], "answer": "Скомпилируется."}, {"id": "00000010-0000-0000-0000-000000000010", "question": "Скомпилируется ли данный код? Если да, то что будет являться результатом его выполнения?", "questionJSONCode": ["let name = \"Maxim\"", "switch name{", "   case \"Maxim\":", "       fallthrough", "   case \"Maria\", \"Mark\", \"Igor\":", "       print(\"Friend\")", "   default:", "       print(\"Default name\")"], "answer": "Friend. Оператор fallthrough переводит switch к выполнению следующего case."}, {"id": "00000011-0000-0000-0000-000000000011", "question": "Скомпилируется ли данный код?", "questionJSONCode": ["let numbers = [1, 3, 5, 7, 9]", "let result = numbers.map { $0 * 10 }", "print(numbers)"], "answer": "Скомпилируется и еапечатает исходный массив: 1,3,5,7,9, т.к. map не изменяет оригинальный массив."}, {"id": "00000012-0000-0000-0000-000000000012", "question": "Скомпилируется ли данный код? Если да, какой тип у testVar?", "questionJSONCode": ["let names = [\"Doctor\": \"Igor\", \"Nurse\": \"Maria\"]", "for (key, value) in names.enumerated() {", "   let testVar = value", "   print(testVar)", "}"], "answer": "(key: \"Doctor\", value: \"Igor\"), т.е. tuple (String, String)."}, {"id": "00000013-0000-0000-0000-000000000013", "question": "Скомпилируется ли данный код?", "questionJSONCode": ["let status = \"shiny\"", "for (position, character) in status.reversed().enumerated() where position % 2 == 0 {", "   print (\"\\(position): \\(character)\")", "}"], "answer": "Скомпилируется. Выведет - 0: y, 2: i, 4: s."}, {"id": "00000014-0000-0000-0000-000000000014", "question": "Скомпилируется ли данный код? Если да, какой тип будет у result?", "questionJSONCode": ["func doStuff() {", "   print(\"Stuff has been done\")", "}", "let result = doStuff()"], "answer": "(), пустой tuple. typealias Void = (), а эта функция ничего не возвращает."}, {"id": "00000015-0000-0000-0000-000000000015", "question": "Скомпилируется ли данный код?", "questionJSONCode": ["let names = [\"Mark\", \"Sergey\", \"Ian\"]", "let result = names.sorted { $0 > $1 }", "print(result)"], "answer": "[\"Sergey\", \"Mark\", \"Ian\"], т.к. сортировка ведется по положению буквы в алфавите, а чем буква дальше от начала, тем ее порядковый номер выше."}, {"id": "00000016-0000-0000-0000-000000000016", "question": "Скомпилируется ли данный код? Если да, какой будет тип у firstName?", "questionJSONCode": ["let names: [String?] = [\"Barbara\", nil, \"Janet\", nil, \"Peter\", nil]", "if let firstName = names.first {", "   print(firstName)", "｝"], "answer": "Optional(String), т.к. сам массив является Optional + метод first возвращает Optional, то firstName получает тип двойного опционала (опционал вложен в опционал - ??), а через if let разворачивается только первый уровень."}, {"id": "00000017-0000-0000-0000-000000000017", "question": "Скомпилируется ли данный код? Какое значение будет у example2?", "questionJSONCode": ["var names = [String]()", "names.append (\"Maria\")", "let example1 = names.removeLast()", "let example2 = names.removeLast()"], "answer": "Скомпилируется, но runtime выдаст ошибку: из пустого массива нельзя удалить элемент. ВАЖНО: removeLast() является mutating func, т.е. он изменяет коллекцию к которой обращается."}, {"id": "00000018-0000-0000-0000-000000000018", "question": "Скомпилируется ли данный код? Какое значение будет у example2?", "questionJSONCode": ["var names = [String]()", "names.append(\"Maria\")", "let example1 = names.popLast()", "let example2 = names.popLast()"], "answer": "nil, popLast() является mutating func, но возвращает опциональное значение."}, {"id": "00000019-0000-0000-0000-000000000019", "question": "Что выведется и почему?", "questionJSONCode": ["let view2 = UIView()", "view2.backgroundColor = .red", "view2.layer.backgroundColor = UIColor.blue.cgColor", "print(view2.backgroundColor)"], "answer": "Выведется синий цвет, т.к. за отрисовку отвечает layer, а view — контейнер, который отвечает за обработку взаимодействия с пользователем."}, {"id": "00000020-0000-0000-0000-000000000020", "question": "Что выведется и почему? Как узнать frame во время анимации?", "questionJSONCode": ["let duration: TimeInterval = 10.0", "let firstFrame = CGRect(origin: .zero, size: .zero)", "let secondFrame = CGRect(origin: .zero, size: .init(width: 10, height: 10))", "let view = UIView(frame: firstFrame)", "UIView.animate(withDuration: duration) {", "    view.frame = secondFrame", "}", "", "Timer.scheduledTimer(withTimeInterval: 5.0, repeats: false) { _ in", "    print(view.frame)", "}"], "answer": "Так как за отрисовку анимации отвечает layer, то для получения корректных данных фрейма нужно обращаться именно к нему через метод presentation() и снимать через него frame. У самой view значения фрейма будут сразу конечные, так как фрейм не работает с анимацией и его значения сразу устанавливаются в конечные. В Playground не отрабатывает корректно, так как отсутствует симулятор и сама анимация, однако при запуске на симуляторе все отображается корректно. B Timer.scheduledTimer { print(view.layer.presentation()?.frame) }"}, {"id": "00000021-0000-0000-0000-000000000021", "question": "Что выведется? Почему выводится по обращению к view?", "questionJSONCode": ["class MyViewController: UIViewController {", "    override func viewDidLoad() {", "        super.viewDidLoad()", "        print (2)", "        DispatchQueue.main.async {", "            print (3)", "            DispatchQueue.main.sync {", "                print (5)", "            }", "            print (4)", "        }", "        print (6)", "    }", "}", "", "let vc = MyViewController()", "print (1)", "vc.view.backgroundColor = .red", "print (7)"], "answer": "1, 2, 6, 7, 3. Такой вывод обусловлен тем, что вью создается лениво, т.е. только тогда, когда оно действительно необходимо."}, {"id": "00000022-0000-0000-0000-000000000022", "question": "Что выведется в принт?", "questionJSONCode": ["struct Car {", "    var name = \"BMW\"", "}", "", "var myCar: Car? = Car()", "", "let closure = {", "    guard let myCar = myCar else {", "        print(\"I don't have a car\")", "        return", "    }", "    print (\"My car is \\(myCar.name)\")", "}", "", "myCar?.name = \"Toyota\"", "closure()"], "answer": "Toyota"}, {"id": "00000023-0000-0000-0000-000000000023", "question": "Что выведется в принт?", "questionJSONCode": ["DispatchQueue.main.async {", "    print(\"1\")", "    DispatchQueue.global().async {", "        print(\"2\")", "    }", "    print(\"3\")", "}", "print(\"4\")"], "answer": "4, 1, 3, 2"}, {"id": "00000024-0000-0000-0000-000000000024", "question": "Что выведется и почему?", "questionJSONCode": ["protocol Movable {", "    func walk()", "}", "", "extension Movable {", "    func crawl() {", "        print(\"Default crawling\")", "    }", "}", "", "struct Animal: Movable {", "    func walk() {", "        print(\"Animal is walking proudly\")", "    }", "    func crawl () {", "        print(\"Animal is crawling silently\")", "    }", "}", "", "let panda = Animal()", "panda.walk()", "panda.crawl()", "let wolf: Movable = Animal()", "wolf.walk()", "wolf.crawl()"], "answer": "panda: Animal\npanda.walk() - статический вызов из структуры\npanda.crawl() - статический вызов из структуры\nwolf: Movable\nwolf.walk() - динамический вызов через vtable\nwolf.crawl() - статический вызов из extension"}, {"id": "00000025-0000-0000-0000-000000000025", "question": "Что выведется и почему? если не верно, исправить и объяснить", "questionJSONCode": ["class TestClass {", "    var name = \"\"", "    var block1: (() -> Void)?", "    var block2: (() -> Void)?", "", "    func test() {", "        self.block1 = {", "            self.block2 = {", "                print(self)", "            }", "            self.block2?()", "        }", "        self.block1?()", "    }", "", "    deinit {", "        print(\"deinit\")", "    }", "}", " ", "var testObject: TestClass? = TestClass()", "testObject?.test()", "testObject = nil"], "answer": "Выведется только описание объекта, deinit не выведется из-за возникновения цикла сильных ссылок.\nself.block1 = { [weak self] in\nself?.block2 = {\n    print(self)\n}\n self?.block2?()"}, {"id": "00000026-0000-0000-0000-000000000026", "question": "Что выведется и почему?", "questionJSONCode": ["protocol Animal {", "   func say()", "}", "", "extension Animal {", "    func say() {", "        print (\"Animal\")", "    }", "}", "", "class Cat: Animal {", "    func say() {", "        print (\"Cat\")", "    }", "}", "", "let cat: Animal = Cat()", "cat.say()", "Cat().say()"], "answer": "Cat Cat - оба раза динамический вызов через vtable"}, {"id": "00000027-0000-0000-0000-000000000027", "question": "Что не скомпилится и почему?", "questionJSONCode": ["class A {", "    var a: A?", "}", "", "struct B {", "    var b: [B]?", "}", "", "struct C {", "    var c: C?", "}"], "answer": "Не скомпилится struct C, так как типы значений занимают строго определенный размер в памяти, определяемый на этапе компиляции. Если структура рекурсивно содержит саму себя ее размер невозможно высчитать. Для struct В это условие не сработает, так как ее полем является массив, который всегда имеет размер 8 байт (размер указателя). Так сделано из-за оптимизации: это позволяет использовать механизм copy-on-write и динамически выделять память при увеличении массива."}, {"id": "00000028-0000-0000-0000-000000000028", "question": "Что выведется и чему будет равен elements после цикла", "questionJSONCode": ["var elements = [1,2,3]", "for e in elements {", "    print (e)", "    elements = [4,5,6]", "}"], "answer": "1, 2, 3. [4,5,6]"}, {"id": "00000029-0000-0000-0000-000000000029", "question": "Что будет выведено в консоль?", "questionJSONCode": ["class A {", "    init() { print(\"init A\") }", "    deinit { print(\"deinit A\") }", "}", "", "class B {", "    let a = A()", "    init() { print(\"init B\") }", "    deinit { print(\"deinit B\") }", "}", "", "class C: A {", "    let b = B()", "    override init() { print(\"init C\") }", "    deinit { print(\"deinit C\") }", "}", "", "var c: C? = C()", "c = nil"], "answer": "init: A, B, C, A  deinit: C A B A"}, {"id": "00000030-0000-0000-0000-000000000030", "question": "Что будет выведено на печать?", "questionJSONCode": ["func deferTest() -> String {", "var currentString = \"\"", "currentString += \"A\"", "defer {", "    currentString += \"B\"", "}", "if true {", "    defer {", "        currentString", "        += \"C\"", "    }", "    defer {", "        currentString", "        += \"D\"", "    }", "    currentString += \"E\"", "}", "currentString += \"F\"", "defer {", "    currentString += \"G\"", "}", "return currentString", "}", "", "print(deferTest())"], "answer": "A E D C F"}, {"id": "00000031-0000-0000-0000-000000000031", "question": "Что будет выведено на печать?", "questionJSONCode": ["func nilDictionaryTest() {", "    var dictWithNils: [String: Int?] = [", "        \"one\": 1,", "        \"two\": 2,", "        \"none\": nil", "    ]", "", "    print(dictWithNils.count)", "    dictWithNils[\"two\"] = nil", "    dictWithNils[\"none\"] = nil", "", "    print(dictWithNils.count)", "}"], "answer": "3, 1"}, {"id": "00000032-0000-0000-0000-000000000032", "question": "Что будет выведено на печать?", "questionJSONCode": ["func enumTest() {", "    enum Foo: RawRepresentable {", "        case one", "        case two", "", "        init? (rawValue: Int) {", "            self = .one", "        }", "", "        var rawValue: Int {", "            return 1", "        }", "    }", "", "    print(Foo.one == Foo.two)", "}", "", " enumTest()"], "answer": "true, потому что enum реализует RawRepresentable, а оба case возвращают одинаковый rawValue = 1. Сравнение выполняется по rawValue, поэтому фактически сравнивается 1 == 1."}, {"id": "00000033-0000-0000-0000-000000000033", "question": "Что будет выведено на печать?", "questionJSONCode": ["func enumTest() {", "    enum Foo: RawRepresentable {", "        case one", "        case two", "", "        init? (rawValue: Int) {", "            self = .one", "        }", "", "        var rawValue: Int {", "            return 1", "        }", "    }", "", "    let someValue = Foo(rawValue: 100)", "", "    switch someValue {", "    case .one: print (\"one\")", "    case .two: print (\"two\")", "    }", "}", "enumTest()"], "answer": "one, потому что Foo(rawValue: 100) возвращает .one по реализации init."}, {"id": "00000034-0000-0000-0000-000000000034", "question": "Что будет выведено на печать?", "questionJSONCode": ["func enumTest() {", "    enum Foo: Int {", "        case a, b = 1000, c, d = 5000, e", "    }", "    print (Foo.a.rawValue)", "    print (Foo.c.rawValue)", "    print (Foo.e.rawValue)", "}", "enumTest()"], "answer": "0, 1001, 5001"}, {"id": "00000035-0000-0000-0000-000000000035", "question": "Что будет выведено на печать?", "questionJSONCode": ["func enumTest() {", "    let number = 5", "    var result = 0", "", "    switch number {", "    case 1...5:", "        result = 1", "        fallthrough", "    case 2:", "        result = 2", "    case 5:", "        result = 3", "    default:", "        result = 4", "    }", "", "    print (result)", "}", "enumTest()"], "answer": "2"}, {"id": "00000036-0000-0000-0000-000000000036", "question": "Что будет выведено на печать?", "questionJSONCode": ["struct Car {", "    var name = \"BMW\"", "}", "", "var myCar: Car? = Car()", "", "let closure = { [myCar] in", "    guard let myCar = myCar", "    else {", "        print(\"I don't have a car\")", "        return", "    }", "    print (\"My car is \\(myCar.name)\")", "}", "", "myCar?.name = \"Toyota\"", "closure()"], "answer": "BMW, потому что значение удерживается списком захвата"}, {"id": "00000037-0000-0000-0000-000000000037", "question": "Что будет выведено на печать?", "questionJSONCode": ["class Car {", "    var name = \"BMW\"", "}", "", "var myCar: Car? = Car()", "", "let closure = { [myCar] in", "    guard let myCar = myCar else {", "        print(\"I don't have a car\")", "        return", "    }", "    print(\"My car is \\(myCar.name)\")", "}", "", "myCar?.name = \"Toyota\"", "closure()"], "answer": "Toyota, потому что кложур захватывает класс, а не его свойство"}, {"id": "00000038-0000-0000-0000-000000000038", "question": "Что будет выведено на печать?", "questionJSONCode": ["class Car {", "    var name = \"BMW\"", "}", "", "var myCar: Car? = Car()", "", "let closure = { [myCar] in", "    guard let myCar = myCar else {", "        print(\"I don't have a car\")", "        return", "    }", "    print (\"My car is \\(myCar.name)\")", "}", "", "myCar?.name = nil", "closure()"], "answer": "BMW, потому что кложур захватит класс и уже его не отпустит, не даст выставить в nil"}, {"id": "00000039-0000-0000-0000-000000000039", "question": "Что будет выведено на печать?", "questionJSONCode": ["class Car {", "    var name = \"BMW\"", "}", "", "var myCar: Car? = Car()", "", "let closure = { [weak myCar] in", "    guard let myCar = myCar else {", "        print(\"I don't have a car\")", "        return", "    }", "    print (\"My car is \\(myCar.name)\")", "}", "", "myCar?.name = nil", "closure()"], "answer": "I don't have a car т.k. ссылка на myCar - слабая"}, {"id": "00000040-0000-0000-0000-000000000040", "question": "Что будет выведено на печать?", "questionJSONCode": ["struct Car {", "    var name = \"BMW\"", "}", "", "var myCar: Car? = Car()", "", "let closure = { [weak myCar] in", "    guard let myCar = myCar else {", "        print(\"I don't have a car\")", "        return", "    }", "    print(\"My car is \\(myCar.name)\")", "}", "", "myCar?.name = nil", "closure()"], "answer": "ошибка, т.к. weak не может применяться к value-типам"}, {"id": "00000041-0000-0000-0000-000000000041", "question": "Что будет выведено на печать?", "questionJSONCode": ["DispatchQueue.main.async {", "    print (\"1\")", "    DispatchQueue.main.sync {", "        print (\"2\")", "    }", "    print (\"3\")", "    print (\"4\")", "}"], "answer": "1"}, {"id": "00000042-0000-0000-0000-000000000042", "question": "Что будет выведено на печать?", "questionJSONCode": ["DispatchQueue.global().async {", "    print (\"1\")", "    DispatchQueue.main.sync {", "        print (\"2\")", "    }", "    print (\"3\")", "}", "print (\"4\")"], "answer": "4, 1, 2, 3"}, {"id": "00000043-0000-0000-0000-000000000043", "question": "Что будет выведено на печать?", "questionJSONCode": ["DispatchQueue.global().async {", "    print (\"1\")", "    DispatchQueue.global().sync {", "        print (\"2\")", "    }", "    print (\"3\")", "}", "print (\"4\")"], "answer": "4, 1, 2, 3"}, {"id": "00000044-0000-0000-0000-000000000044", "question": "Что будет выведено на печать?", "questionJSONCode": ["let matrix = [[1, 2], nil, [3, 4], [nil, 5], nil]", "", "print(matrix.map { $0?.count } )", "print(matrix.compactMap { $0?.count } )", "print(matrix.compactMap { $0?.count }.flatMap { $0 }.reduce(0, +))"], "answer": "[Optional(2), nil, Optional(2), Optional(2), nil]\n[2, 2, 2]\n6"}, {"id": "00000045-0000-0000-0000-000000000045", "question": "Что будет выведено на печать?", "questionJSONCode": ["var result = Set(arrayLiteral: 1, 2, 2, 3, 3, 3, 1, 1).reduce(12, +)", "print(result)"], "answer": "18"}, {"id": "00000046-0000-0000-0000-000000000046", "question": "Что будет выведено в консоль?", "questionJSONCode": ["var array = [1,2,3]", "", "for i in 0..<array.count {", "    array.append(i)", "}", "", "print(array)"], "answer": "[1,2,3,0,1,2]. Диапазон 0..<array.count вычисляется один раз перед началом цикла."}, {"id": "00000047-0000-0000-0000-000000000047", "question": "Что будет выведено на печать?", "questionJSONCode": ["var x = 5", "", "let closure = {", "    print(x)", "}", "", "x = 10", "closure()"], "answer": "10. Closure захватывает переменную по ссылке, а не её значение."}, {"id": "00000048-0000-0000-0000-000000000048", "question": "Что не так в этом коде и как исправить?", "questionJSONCode": ["import Combine", "", "class ViewModel {", "    @Published var text: String = \"\"", "    var cancellable: AnyCancellable?", "", "    init() {", "        cancellable = Just(\"Hello\")", "            .assign(to: \\.text, on: self)", "    }", "}"], "answer": "Возможно утечка памяти, так как .assign(to: \\.text, on: self) сильно удерживает self. Необходимо использовать .assign(to: &$text)"}, {"id": "00000049-0000-0000-0000-000000000049", "question": "Скомпилируется ли код?", "questionJSONCode": ["struct Counter {", "    var value = 0", "", "    func increment() {", "        value += 1", "    }", "}"], "answer": "Нет. Методы struct, которые изменяют свойства, должны быть помечены как mutating."}, {"id": "00000050-0000-0000-0000-000000000050", "question": "Скомпилируется ли код?", "questionJSONCode": ["class ViewModel {", "    var text = \"Hello\"", "", "    func update() {", "        Task.detached {", "            self.text = \"Updated\"", "        }", "    }", "}"], "answer": "Нет. Task.detached принимает @Sendable closure, а self не соответствует Sendable, плюс у него mutable state => возможный data race + нарушение правил Sendable"}, {"id": "00000051-0000-0000-0000-000000000051", "question": "1. Что выведется и почему? 2. Как изменить вывод?", "questionJSONCode": ["public typealias Figure = [CGPoint]", "extension Array where Element == CGPoint {", "    static var empty: [CGPoint] {", "       return []", "   }", "}", "", "public protocol Drawing: AnyObject {", "    func draw(figure: Figure)", "func circle()", "}", "", "extension Drawing {", "    public func circle() {", "        print(\"protocol\")", "    }", "    public func draw(figure: Figure) {", "        circle()", "    }", "}", "", "public class Drawer: Drawing {", "    public func circle() {", "        print(\"class\")", "    }", "let drawer = Drawer()", "drawer.draw(figure: .empty)", "}"], "answer": "Выведется Class потому что drawer имеет тип Drawer который содержит свою реализацию метода circle, и не смотря на то что drawer.draw(figure: .empty) вызывается через статическую диспетчеризацию, будет использован Virtual Table. Чтобы изменить вывод нужно убрать из потокола метод circle"}, {"id": "00000052-0000-0000-0000-000000000052", "question": "Какой вывод будет у print(dict.count) в 1 и во 2 случае? Какой тип у переменных a, a1, a2?", "questionJSONCode": ["var dict: [String: Int?] = [", "   \"one\": 1,", "   \"two\": 2,", "  \"none\": nil", "]", "print(dict.count)", "dict[\"two\"] = nil", "dict[\"none\"] = nil", "print(dict.count)", "let a = dict[\"one\"]", "let a2 = dict[\"two\"]", "let a3 = dict[\"five\"]"], "answer": "у 1 print - вывод 3, у 2 - вывод 1, у переменных a, a1, a2 тип Int?? == Optional(Optional(Int))"}, {"id": "00000053-0000-0000-0000-000000000053", "question": "что происходит в памяти с массивом?(где и как хранится массив и его элементы?) как увеличивается память если место в массиве заканчивается? что будет если закончится память?", "questionJSONCode": ["var array = [0, 1, 2]", "", "for i in 3...10_000_000_000 { // Условно много раз добавляем в конце элементы", "   array.append(i)", "}"], "answer": "Массив создается на стеке, но данные массива хранятся на куче. Если место в массиве заканчивается, то он увеличивается в 2 раза. Если закочится память то будет краш приложения"}, {"id": "00000054-0000-0000-0000-000000000054", "question": "Какая сложность преобразования numbers к Any?", "questionJSONCode": ["let numbers = [0, 1, 2, 3]", "let values = numbers as [Any]"], "answer": "O(n)"}, {"id": "00000055-0000-0000-0000-000000000055", "question": "Нужно получить массив справа из массива слева, как это сделать? Желательно самую короткую запись", "questionJSONCode": ["let array = [[7,72,3,4], [1,3,4,4,4,65], [6,3,4,5,6,1,1,1,6,9]] -> [72, 65, 9, 7, 6, 5, 4, 3, 1]"], "answer": "Array(Set(array.flatMap { $0 })).sorted(by: >)"}], "theory": [{"id": "10000001-0000-0000-0000-000000000001", "question": "Чем отличается frame от bounds?", "answer": "Frame и bounds — это два свойства UIView, описывающие её геометрию, но в разных системах координат:\n- frame — положение и размер view в системе координат superview.\n- bounds — положение и размер в собственной системе координат view.\nИзменение frame двигает и/или масштабирует view относительно родителя. Изменение bounds влияет на внутреннюю систему координат и расположение subviews.\nframe зависит от transform (может меняться при повороте/масштабировании), bounds не зависит от transform.\nbounds.origin обычно (0,0), но может изменяться (например, при UIScrollView)."}, {"id": "10000002-0000-0000-0000-000000000002", "question": "Путь тача в iOS. Где отрабатывает hitTest? Что такое responder chain?", "answer": "Путь тача в iOS:\n- Пользователь касается экрана → событие попадает в UIApplication.\n- Далее событие передается в UIWindow, где начинается hit-testing.\n- Метод hitTest(_:with:) вызывается у UIWindow, затем рекурсивно у его subviews сверху вниз по иерархии (от front-view к back-view).\n- hitTest использует point(inside:with:), чтобы проверить, находится ли точка внутри view. В результате определяется самая глубокая view, которая может принять событие — она становится first responder для тача.\nВ качестве аргументов в hit-test передаются CGPoint? и UIEvent?\n\nResponder Chain — это цепочка объектов, через которую передаются события, если текущий responder их не обработал.\nТипичная цепочка:\nUIView → superview → UIViewController → UIWindow → UIApplicationn\nЧерез responder chain передаются:\n- touch events\n- action messages (target-action)\n- события клавиатуры и меню."}, {"id": "10000003-0000-0000-0000-000000000003", "question": "Что такое generics?", "answer": "Generics — это механизм Swift, позволяющий писать универсальный код, работающий с разными типами, сохраняя при этом type safety (проверку типов на этапе компиляции). Тип параметризуется placeholder-типом (например T), который подставляется компилятором при использовании. Можно задавать ограничения типов (T: Protocol или T: SomeClass).\n\nGenerics используются в:\n- функциях\n- типах (struct, class, enum)\n- протоколах (через associatedtype)\n\nПреимущества:\n- повторное использование кода\n- строгая типизация без Any\n- оптимизация компилятором (без runtime-кастов).\n\nПримеры generics в стандартной библиотеке: Array<T>, Dictionary<Key, Value>, Optional<Wrapped>"}, {"id": "10000004-0000-0000-0000-000000000004", "question": "Что такое протоколы? Для чего нужен associatedtype?", "answer": "Протокол — это контракт, который описывает набор требований (методы, свойства, сабскрипты), которые должен реализовать тип (struct, class, enum). Протокол определяет поведение, но не содержит реализации (кроме default-реализаций через extension).\n\nПротоколы используются для:\n- абстракции и полиморфизма\n- dependency injection\n- protocol-oriented programming (POP)\n- associatedtype — это placeholder-тип внутри протокола, позволяющий описывать требования к неизвестному типу, который конкретная реализация определит сама.\n\nПример:\nprotocol Storage {\n    associatedtype Item\n    func store(_ item: Item)\n}\nКаждый тип, реализующий протокол, задаёт свой Item.\nassociatedtype нужен, когда протокол работает с типом, который должен быть связан с конкретной реализацией, и это делает протокол обобщённым (generic-like)."}, {"id": "10000005-0000-0000-0000-000000000005", "question": "Что такое Optional в Swift и как он реализован? Для чего нужен nil?", "answer": "Optional — это тип в Swift, который обозначает, что значение может либо существовать, либо отсутствовать.\nВнутри Optional реализован как обобщённый enum:\nenum Optional<Wrapped> {\n    case none\n    case some(Wrapped)\n}\n.some(value) — содержит значение\n.none — отсутствие значения (nil)\nnil — это специальное значение, соответствующее .none, означающее отсутствие значения.\n\nOptional используется для:\n- безопасной работы с отсутствующими данными\n- явного обозначения потенциально отсутствующих значений.\n\nЧтобы получить значение из Optional, используют:\n- optional binding (if let, guard let)\n- optional chaining (let count = object?.property?.method())\n- nil-coalescing (??)\n- force unwrap (!, небезопасно)."}, {"id": "10000006-0000-0000-0000-000000000006", "question": "Что происходит при запуске iOS приложения после тапа по иконке?", "answer": "1. Пользователь тапает по иконке → SpringBoard отправляет системе запрос на запуск приложения.\n2. iOS загружает исполняемый файл приложения и запускает функцию main().\n3. main() вызывает UIApplicationMain, которая создаёт объект UIApplication и делегат приложения (AppDelegate).\n4. Система инициализирует application lifecycle и вызывает application(_:didFinishLaunchingWithOptions:).\n5. Если используется сцены (iOS 13+), создаётся UISceneSession и вызываются методы SceneDelegate (scene(_:willConnectTo:)).\n6. Создаётся UIWindow, назначается rootViewController и формируется иерархия view.\n7. Окно становится key and visible, интерфейс отображается на экране.\n8. После этого приложение входит в run loop, ожидая пользовательские события (тачи, таймеры, системные события)."}, {"id": "10000007-0000-0000-0000-000000000007", "question": "Что такое ООП? Какие проблемы ООП решает ПОП и каким образом?", "answer": "ООП (Object-Oriented Programming) — парадигма, в которой программа строится вокруг объектов, объединяющих данные и поведение. Это упрощает моделирование предметной области и повторное использование кода.\nОсновные принципы:\n- абстракция: выделение существующих свойств и методов, необходимых для решения задачи\n- инкапсуляция: механизм объединения данных в единый компонент, позволяющих скрыть и защитить их\n- наследование: создание нового объекта на основе уже существующего с добавлением новых методов и свойств\n- полиморфизм: возможность использования объектов-потомков в контексте, который был предназначен для объекта-родителя\n\nPOP (Protocol-Oriented Programming) — подход, активно используемый в Swift, где поведение описывается через протоколы, а типы композируют функциональность, реализуя несколько протоколов.\nPOP призвано решить следующие проблемы ООП:\n- наследование излишней функциональность\n- невозможность множественного наследования\n- безопасность кода в плане утечек памяти\nРОР реализует это через следующие механизмы:\n- заменяет наследование композицией протоколов\n- позволяет добавлять default-реализации через protocol extensions\n- лучше работает с value types (struct/enum).\n\nКоротко: ООП строит иерархии классов, POP — композицию поведения через протоколы."}, {"id": "10000008-0000-0000-0000-000000000008", "question": "Что такое DI? Какие виды DI используются в Swift? Отличие DI от IoC?", "answer": "Dependency Injection (DI) — это паттерн, при котором объект получает свои зависимости извне, а не создаёт их сам. Это уменьшает связанность, упрощает тестирование и повышает переиспользуемость кода.\n\nОсновные виды DI в Swift:\n1. Initializer Injection — зависимости передаются через инициализатор (самый предпочтительный).\n2. Property Injection — зависимость задаётся через свойство после создания объекта.\n3. Method Injection — зависимость передаётся в конкретный метод.\n\nПреимущества DI:\n- слабая связанность компонентов\n- удобство unit-тестирования (mock/stub)\n- гибкая замена реализаций через протоколы.\n\nIoC (Inversion of Control) — более общий принцип, при котором контроль создания и управления зависимостями передаётся внешнему механизму (DI — это конкретный способ реализации IoC).\nKлючевые аспекты:\n1. Зависимости: Вместо того чтобы класс сам создавал свои зависимости, их следует передавать через инициализацию или специальные методы. Это позволяет легче подменять зависимости во время тестирования.\n2. Интерфейсы и протоколы: В Swift можно использовать протоколы для определения интерфейсов, которые классы или структуры могут реализовывать. Это позволяет программистам создавать более абстрактные связи между компонентами.\n3. Контейнеры внедрения зависимостей: Использование фреймворков, таких как Swinject или Resolver, может помочь упростить управление зависимостями."}, {"id": "10000009-0000-0000-0000-000000000009", "question": "Что такое SOLID и для чего он нужен? Какие еще есть общепринятые принципы проектирования?", "answer": "SOLID — это 5 принципов объектно-ориентированного проектирования, помогающих создавать слабо связанные, расширяемые и поддерживаемые системы.\nS — Single Responsibility Principle\nТип должен иметь одну причину для изменения.\nO — Open/Closed Principle\nКод открыт для расширения, но закрыт для изменения.\nL — Liskov Substitution Principle\nПодтипы должны заменять базовый тип без нарушения логики.\nI — Interface Segregation Principle\nЛучше несколько узких протоколов, чем один большой.\nD — Dependency Inversion Principle\nМодули должны зависеть от абстракций (протоколов), а не от конкретных типов.\n\nДругие распространённые принципы:\n- DRY (Don't Repeat Yourself)\n- KISS (Keep It Short & Simple)\n- YAGNI (You Aren't Gonna Need It)"}, {"id": "10000010-0000-0000-0000-000000000010", "question": "Отличия однонаправленных и двунаправленных архитектур.", "answer": "Однонаправленная архитектура: данные текут в одном направлении: модель → представление → действия → обновление состояния.\nПримеры: Redux, The Composable Architecture (TCA).\nОсобенности:\n- Простая отладка — легко проследить изменения состояния.\n- Предсказуемость — состояние меняется только через экшены и редьюсеры.\nМинус: может быть больше бойлерплейта для простых случаев.\n\nДвунаправленная архитектура: состояние и данные могут меняться и передаваться в обоих направлениях, view напрямую связывается с моделью.\nПримеры: MV(Х) паттерны.\nОсобенности:\n- Более компактно для простых UI, при наличии биндинга изменения автоматически отражаются на view.\nМинус: сложнее отслеживать источник изменений, возможны циклические обновления.\n\nКоротко:\nОднонаправленная = предсказуемость, проще дебажить.\nДвунаправленная = удобство биндинга, но сложнее контроль состояния."}, {"id": "10000011-0000-0000-0000-000000000011", "question": "Отличия композиции от агрегаци? Где и когда они применяются?", "answer": "Композиция и агрегация — способы связывания объектов, но с разной жизненной зависимостью.\nКомпозиция:\n- Характеризируется жёсткой зависимостью: часть не существует без владельца.\n- Жизненный цикл объекта управляется контейнером.\nАгрегация:\n- Характеризируется слабой связью: объект может существовать самостоятельно.\n- Жизненный цикл объекта независим от контейнера.\nКогда применять:\n- Композиция — когда объект полностью владеет частью (например, UIView владеет subviews).\n- Агрегация — когда объект использует сторонние объекты, но не владеет их жизненным циклом (например, Library и Book)."}, {"id": "10000012-0000-0000-0000-000000000012", "question": "Что такое Hashable? Что такое коллизии и как они разрешаются в Swift?", "answer": "Hashable — это протокол, который позволяет типу вычислять хэш-код (hashValue) для использования в коллекциях типа Set и ключах Dictionary. Любой тип, соответствующий Hashable, должен также быть Equatable.\n\nКоллизия — ситуация, когда два разных значения имеют одинаковый хэш-код.\nДля разрешения коллизий в Swift используется метод открытой адресации с линейным зондированием:\n- Выбираем шаг q.\n- При попытке добавить элемент в занятую ячейку i начинаем последовательно просматривать ячейки i+(1⋅q),i+(2⋅q),i+(3⋅q) и так далее, пока не найдём свободную ячейку.\n- В неё и запишем элемент.\nПроще говоря, все записи хранятся в одном массиве, доступ к которому осуществляется по ключевому хешу. Если произошла коллизия, следует записать новый элемент в тот же массив, но на определенном расстоянии от элемента, с которым произошло столкновение. Если эта ячейка тоже занята, проверяют следующую ячейку на таком же расстоянии и т.д."}, {"id": "10000013-0000-0000-0000-000000000013", "question": "Что такое ARC? Какие бывают ссылки? Что такое зомби-объекты?", "answer": "ARC (Automatic Reference Counting) — это механизм управления памятью в Swift/Objective-C, который автоматически отслеживает, когда объекты в куче больше не используются, и освобождает их. ARC работает на этапе компиляции, расставляя retain/release, и во время runtime, добавляя инкременты и декременты счётчика ссылок для каждого объекта.\n\nКак работает ARC:\nКаждый объект хранит счётчик сильных ссылок (strong references). Когда создаётся сильная ссылка на объект, счётчик увеличивается. Когда сильная ссылка удаляется или присваивается nil, счётчик уменьшается. Когда счётчик сильных ссылок достигает 0 — объект деинициализируется (deinit) и память освобождается.\n\nТипы ссылок и их назначение:\n- Strong — стандартная ссылка, удерживает объект в памяти. Пока есть хотя бы одна сильная ссылка, объект не будет удалён.\n- Weak — не увеличивает счётчик сильных ссылок, используется для избежания retain cycles. В runtime слабые ссылки хранятся в side table, чтобы можно было обнулить ссылку при освобождении объекта. Слабые ссылки всегда Optional (weak var obj: Type?).\n- Unowned — тоже не увеличивает счётчик сильных ссылок, но не является Optional. Бывают двух типов: unowned safe и unowned unsafe. Unowned safe: runtime проверяет, что объект существует; если нет — краш приложения (EXC_BAD_ACCESS). Unowned unsafe: возвращает указатель на память, где был объект, что может привести к непредсказуемому поведению, если объект уже освобождён.\n\nЗомби-объекты:\nВ старых версиях ARC объекты имели два счётчика: для сильных и для слабых ссылок. Когда счётчик сильных ссылок уменьшался до 0, а слабые ссылки ещё существовали, объект уничтожался, но память не освобождалась полностью. Появлялся “зомби-объект”, на который ещё ссылались weak. Когда weak-ссылка обращалась к объекту, runtime проверял: это обычный объект или зомби. Если зомби — weak обнулялся, счётчик слабых ссылок уменьшался и память окончательно освобождалась.\nСоответственно возникла проблема - нужно было как-то обнулять слабые ссылки, когда объект освобождался. Но объект уже удалён, а слабые ссылки ещё существуют → runtime не может просто уменьшить счётчик в самом объекте, потому что объекта уже нет. Решение: создать отдельную структуру — side table, которая хранит все слабые ссылки на объект и их счётчики.\nПри деинициализации объекта:\n- runtime проверяет side table\n- обнуляет все weak-ссылки\n- уменьшает счётчик слабых ссылок\n- когда слабых ссылок больше нет — память полностью освобождается."}, {"id": "10000014-0000-0000-0000-000000000014", "question": "Чем поток отличается от очереди? Какие бываются очереди в GCD? В чем суть main?", "answer": "Поток (Thread) и очередь (DispatchQueue) — разные концепции:\n- Поток — это низкоуровневый объект ОС, на котором выполняются инструкции; имеет собственное стековое пространство и системные ресурсы. Управлять потоками напрямую сложно и дорого.\n- Очередь (DispatchQueue) — высокоуровневый объект GCD, который управляет выполнением задач на потоках. Очередь сама решает, на каком потоке запускать задачи, упрощая многопоточность и синхронизацию.\n\nВиды очередей в GCD:\n- Main queue\n  Однопоточная (serial)\n  Привязана к main thread, где обновляется UI\n  Все задачи, которые взаимодействуют с UIKit/SwiftUI, должны выполняться здесь\n- Global queues\n  Многопоточные (concurrent)\n  Разные уровни приоритета (userInteractive, userInitiated, default, utility, background)\n  Используются для фоновых задач, тяжёлых вычислений или сетевых операций\n- Custom queues\n  Можно создавать собственные serial или concurrent queues\n  Полезны для локальной синхронизации или организации очереди задач в модуле\n\nСуть main queue:\nЭто специальная очередь, гарантирующая, что все UI-операции выполняются в одном потоке, предотвращая гонки данных на интерфейсе. Main queue — сердце event loop приложения, задачи сюда попадают через RunLoop и DispatchQueue.main.async.\n\nКоротко: поток — место выполнения, очередь — планировщик задач на потоках; main queue гарантирует безопасное обновление UI на main thread."}, {"id": "10000015-0000-0000-0000-000000000015", "question": "Что такое sync и async? Чем async отличается от многопоточности", "answer": "Sync (synchronous) и async (asynchronous) описывают способ выполнения кода относительно вызывающего потока:\n- Sync — вызывающий поток ждёт завершения задачи. После выполнения код продолжает выполняться.\n- Async — вызывающий поток не ждёт завершения, задача выполняется параллельно, результат можно получить позже через callback, completion handler или async/await.\n\nОтличие async от многопоточности:\nAsync ≠ многопоточность.\nAsync просто не блокирует поток, задача может выполняться на том же потоке или на другом.\nМногопоточность — про фактическое использование нескольких потоков (concurrent execution).\nМожно выполнять async на одном потоке (например, main queue с DispatchQueue.main.async) и все равно не блокировать его.\nAsync — это модель планирования задач, многопоточность — физическое выполнение на разных потоках."}, {"id": "10000016-0000-0000-0000-000000000016", "question": "Что такое TDD? Чем BlackBoxTesting отличается от WhiteBoxTesting?", "answer": "TDD (Test-Driven Development) — методология разработки, при которой сначала пишутся тесты, а потом код, который их проходит. Цикл TDD обычно такой - Red → Green → Refactor:\nRed — пишем тест, который пока не проходит.\nGreen — пишем минимальный код, чтобы тест прошёл.\nRefactor — улучшаем код, сохраняя успешные тесты.\nПреимущества TDD:\n- уменьшает количество багов\n- упрощает рефакторинг\n- документирует поведение через тесты\n\nBlack Box Testing:\n- тестировщик не знает внутренней реализации\n- проверяется только функциональность и результаты\nпримеры: UI-тесты, интеграционные тесты\n\nWhite Box Testing:\n- тестировщик знает внутреннюю структуру кода\n- проверяются ветвления, условия, циклы, внутренние алгоритмы\nпримеры: unit-тесты методов, покрытие кода, тесты сложных алгоритмов"}, {"id": "10000017-0000-0000-0000-000000000017", "question": "Рассказать про методы ViewController's LifeCycle. В каком самом раннем методе доступны границы всех subview? В каком методе можно запускать анимацию? Для чего нужен deinit()? Какие методы и в каком порядке срабатываются при переходе на новый экран?", "answer": "ViewController LifeCycle описывает этапы создания, отображения и уничтожения UIViewController.\nОсновные методы:\n- loadView() — создаёт корневую view, вызывается только если нет xib/storyboard.\n- viewDidLoad() — view загружена в память, но её frame ещё не рассчитан; здесь удобно инициализировать данные и настраивать элементы.\n- viewWillAppear(_:) — вызывается перед появлением на экране, view ещё не показана.\n- viewWillLayoutSubviews() — вызывается перед layout, можно настроить перед позиционированием subviews.\n- viewDidLayoutSubviews() — границы всех subview уже рассчитаны, здесь можно безопасно корректировать layout вручную.\n- viewDidAppear(_:) — view уже на экране, можно запускать анимации и таймеры.\n- viewWillDisappear(_:) / viewDidDisappear(_:) — перед/после скрытия view.\n- deinit() — вызывается при уничтожении контроллера, используется для очистки ресурсов, отмены таймеров, отписки от уведомлений и предотвращения утечек памяти.\n\nПорядок вызова методов при переходе на новый контроллер:\n- viewDidLoad() — загружается view нового контроллера\n- viewWillDisappear(_:) - старый контроллер готовится к исчезновению\n- viewWillAppear(_:) — новый контроллер готовится к появлению\n- viewWillLayoutSubviews() / viewDidLayoutSubviews() - новый контроллер размещает свои subview\n- viewDidAppear(_:) - новый контроллер появился на экране (этот метод не вызывается при модальном переходе)\n- viewDidDisappear(_:) - старый контроллер исчез\nТакой порядок выбран, чтобы предотвратить зависание между view при переходе."}, {"id": "10000018-0000-0000-0000-000000000018", "question": "Рассказать про жизненный цикл приложения. Отличия использования AppDelegate vs SceneDelegate.", "answer": "Жизненный цикл приложения iOS описывает состояния от запуска до завершения:\n1. Not running\nПриложение ещё не запущено.\nМетодов пока нет, процесс запуска ещё не начался.\n2. Inactive\nПриложение запущено, но неактивно (например, входящий звонок, Control Center).\nAppDelegate:\napplicationWillResignActive(_:) — приложение скоро станет неактивным.\nSceneDelegate:\nsceneWillResignActive(_:) — сцена скоро станет неактивной.\n3. Active\nПриложение на переднем плане, обрабатывает события.\nAppDelegate:\napplicationDidBecomeActive(_:) — приложение активировано, можно возобновлять задачи.\nSceneDelegate:\nsceneDidBecomeActive(_:) — сцена активна и готова к взаимодействию с пользователем.\n4. Background\nПриложение в фоне, выполняет задачи (fetch, upload, background task).\nAppDelegate:\napplicationDidEnterBackground(_:) — можно сохранять данные, запускать background tasks.\nSceneDelegate:\nsceneDidEnterBackground(_:) — сцена уходит в фон, можно сохранять состояние UI.\n5. Suspended\nПриложение заморожено, не выполняет код, может быть выгружено системой.\nМетодов нет — это состояние не генерирует коллбэки, управление переходит к системе.\nПеред этим обычно вызываются методы DidEnterBackground для сохранения состояния.\n\nAppDelegate vs SceneDelegate\nAppDelegate (до iOS 13 / для одного окна):\n- управляет всем приложением\n- методы: application(_:didFinishLaunchingWithOptions:), applicationDidEnterBackground(_:), applicationWillTerminate(_:)\n- подходил для single-window приложений\nSceneDelegate (iOS 13+ / многопроцессные UI-сцены):\n- управляет конкретной сценой (окном)\nметоды: scene(_:willConnectTo:), sceneDidBecomeActive(_:), sceneWillResignActive(_:)\n- позволяет запускать несколько независимых окон (например, iPad multi-window)\n\nAppDelegate теперь отвечает за глобальные события (push, notification, life cycle для всего приложения), а SceneDelegate — за UI-сцену"}, {"id": "10000019-0000-0000-0000-000000000019", "question": "Что такое экзистенциальный контейнер и для чего он нужен?", "answer": "Экзистенциальный контейнер (Existential Container) в Swift — это внутренняя структура, которая хранит значение неизвестного на этапе компиляции типа, когда работа идёт через протокол.\n\nЗачем нужен:\nПротоколы в Swift могут быть реализованы разными типами. Компилятор не знает заранее конкретный размер и расположение объекта. Экзистенциальный контейнер позволяет хранить любое значение, соответствующее протоколу, и работать с ним через динамическую диспетчирезацию методов протокола.\n\nВеличина контейнера - 5 машинных слов: 3 слова для объекта и по одному для pwt и vwt. Если объект не помещается в 3 слова, то на него сохраняется ссылка в кучу на адрес объекта.\n\n   PWT (Protocol Witness Table):\n      - Содержит информацию о соответствиях между протоколами и типами, которые реализуют эти протоколы.\n      - Хранит указатели на методы и свойства, которые должны быть вызваны для конкретного экземпляра типа, который реализует этот протокол.\n      - Позволяет Swift эффективно выполнять динамическое связывание, когда протокол используется как тип.\n\n   VWT (Value Witness Table):\n      - Используется для хранения информации о value type и их внутренних представлениях.\n      - Содержит данные о размере, выравнивании и методах копирования и инициализации значений.\n      - Это важно для корректного управления памятью и обеспечения безопасности при работе с value type"}, {"id": "10000020-0000-0000-0000-000000000020", "question": "Что такое copy-on-write? Где используется? Как реализуется?", "answer": "Copy-on-Write (COW) — это оптимизация управления памятью, при которой копия объекта создаётся только при изменении, а не при присваивании. То есть несколько переменных могут делить один экземпляр, пока никто его не модифицирует.\n\nКак работает:\nСоздаётся объект и присваивается нескольким переменным — все используют одну память. При попытке модификации проверяется счётчик ссылок. Если объект используется более чем одной ссылкой, выполняется копирование перед изменением. Если объект уникален, изменения происходят без копирования.\n\nГде используется:\nВ Swift value types: Array, Dictionary, Set, String.\nПозволяет эффективно хранить и передавать большие коллекции без лишнего копирования.\n\nКак реализуется:\nСтруктура хранит ссылку на внутреннюю память (heap).\nПри мутации вызывается проверка isKnownUniquelyReferenced(&storage)\nЕсли true — объект уникален, изменения выполняются напрямую.\nЕсли false — создаётся копия, изменения применяются к ней.\n\nКоротко: COW обеспечивает эффективное копирование value types, минимизируя расход памяти и сохраняя семантику value type."}, {"id": "10000021-0000-0000-0000-000000000021", "question": "Какие в Swift есть reference и value types?", "answer": "Value types (типы-значения)\nПримеры: struct, enum, tuple, String, Array, Dictionary.\nПоведение: при присваивании или передаче в функцию создаётся копия.\nХранение в памяти: обычно в стеке, если объект небольшой и локальный; для больших коллекций или при COW — данные могут храниться в куче.\nПлюсы: безопасны для многопоточности, предсказуемы, легко тестируются, изменения одного экземпляра не влияют на другие.\nМинусы: большие структуры без COW могут быть дорогими по копированию; сложнее моделировать объекты с разделяемым состоянием.\n\nReference types (типы-ссылки)\nПримеры: class, closure, actor.\nПоведение: присваивание передаёт ссылку, изменения видны во всех местах, где есть ссылка.\nХранение в памяти: объекты всегда в куче, ссылки — на стеке. В редких случаях для оптимизации компилятор может размещать short-lived объекты в стеке (escape analysis).\nПлюсы: позволяют моделировать разделяемое состояние, наследование, полиморфизм, деинициализацию.\nМинусы: возможны retain cycles, утечки памяти; сложнее отладка при многопоточности; изменение состояния может быть неожиданным.\n\nReference type может оказаться в стеке, если объект локальный и компилятор оптимизирует его размещение на этапе SIL.\n\nValue type может оказаться в куче в следующих случаях:\n- если используется COW или объект большой (например, массив с большим количеством элементов)\n- при реализации протокола\n- при смешении value и reference types\n- при использовании generic c value type\n- при захвате escaping closure\n- inout аргумент"}, {"id": "10000022-0000-0000-0000-000000000022", "question": "Что такое RunLoop? Как он связан с main thread и обработкой событий в iOS? Для чего нужен AutoreleasePool?", "answer": "RunLoop — это механизм event loop, который обрабатывает события и задачи на потоке, удерживая поток активным и ожидающим работы. Он постоянно выполняет цикл:\n- ожидает событие (тач, таймер, сетевой callback),\n- пробуждается,\n- обрабатывает событие,\n- возвращается в режим ожидания.\nMain thread приложения имеет главный RunLoop.\nЧерез него проходят:\n- touch events\n- UI updates\n- timers\n- input sources (например, системные события)\nUIKit работает только на main thread, поэтому все пользовательские события проходят через main RunLoop.\n\nОсновные компоненты RunLoop:\n- Input Sources — внешние события (тачи, IPC).\n- Timers — таймеры (Timer).\n- Observers — наблюдатели за фазами RunLoop.\n- Modes — режимы работы (например default, tracking для скролла).\n\nAutoreleasePool\nAutoreleasePool — механизм управления памятью из Objective-C runtime, который хранит объекты, помеченные для отложенного освобождения (autorelease).\nКак работает:\n- объект добавляется в autorelease pool\n- фактическое освобождение происходит в конце итерации RunLoop\nэто позволяет избежать преждевременного удаления объектов, используемых в текущем цикле.Где используется\nВ main RunLoop автоматически создаётся autoreleasepool на каждой итерации.\nМожно создавать вручную (например, в больших циклах или background задачах) для контроля потребления памяти.\n\nКоротко:\nRunLoop — это цикл обработки событий потока; главный RunLoop управляет UI и пользовательскими событиями, а AutoreleasePool освобождает временные объекты в конце каждой итерации этого цикла."}, {"id": "10000023-0000-0000-0000-000000000023", "question": "Какие есть коллекции в Swift? Чем отличаются? Какая временная сложность для вставки, поиска и удаления элемента у каждой из коллекций и почему?", "answer": "В стандартной библиотеке Swift основные коллекции: Array, Set, Dictionary.\n\nArray\nУпорядоченная коллекция элементов одного типа, доступ по индексу. Реализован как динамический массив (contiguous memory).\nСложность:\n- доступ по индексу — O(1)\nпоиск — O(n) (линейный перебор)\n- вставка в конец — O(1) амортизированно\n- вставка/удаление в середине — O(n) (нужно сдвигать элементы)\nПричина: элементы лежат подряд в памяти.\n\nSet\nКоллекция уникальных элементов без гарантированного порядка. Основана на hash table.\nСложность:\n- вставка — O(1) в среднем\n- удаление — O(1) в среднем\n- поиск — O(1) в среднем\nПричина: используется хэш элемента, поэтому доступ идёт напрямую в bucket.\n\nDictionary\nКоллекция пар ключ-значение, ключи должны быть Hashable. Также реализован через hash table.\nСложность:\nпоиск по ключу — O(1) в среднем\nвставка — O(1) в среднем\nудаление — O(1) в среднем\nПричина: доступ происходит по hash(key).\n\nВажные нюансы\nВ худшем случае для Set и Dictionary сложность может стать O(n) при hash collisions.\nArray, Set, Dictionary — value types и используют Copy-on-Write, поэтому копирование происходит только при модификации."}, {"id": "10000024-0000-0000-0000-000000000024", "question": "Какие виды диспетчеризации используются в Swift?", "answer": "Диспетчеризация — это механизм, определяющий как и когда выбирается реализация метода для вызова. В Swift используются несколько типов dispatch.\n1. Static Dispatch\nМетод выбирается на этапе компиляции.\nИспользуется для:\n- struct, enum\n- final классов и методов\n- функций и методов в extensions без требований протокола\nПлюсы: самый быстрый, нет runtime-поиска метода.\n\n2. Table Dispatch (Virtual Dispatch)\nМетод выбирается во время выполнения через vtable.\nИспользуется для:\n- методов class\n- методов, которые могут быть переопределены (override)\nМеханизм:\n- у класса есть таблица виртуальных методов (vtable)\n- при вызове метода runtime ищет реализацию в таблице.\n\n3. Witness Table Dispatch\nИспользуется для протоколов.\nМеханизм:\n- для типа, реализующего протокол, создаётся witness table\n- она хранит указатели на реализации требований протокола\n- при вызове метода через протокол используется эта таблица.\n\n4. Message Dispatch\nИспользуется в Objective-C runtime.\nАктивируется через:\n- @objc\n- dynamic\nМетод ищется через runtime messaging (objc_msgSend).\nПлюсы: поддерживает method swizzling, dynamic features.\nМинусы: самый медленный."}, {"id": "10000025-0000-0000-0000-000000000025", "question": "Что такое App Group? Какие данные в ее рамках можно шарить?", "answer": "App Group — это механизм iOS, позволяющий нескольким приложениям или расширениям одного разработчика обмениваться данными через общий контейнер. Используется, например, для связи основного приложения с extensions (Widget, Share Extension, Notification Extension). После настройки App Group система создаёт общий sandbox-контейнер, доступный всем участникам группы через group identifier.\n\nЧто можно шарить:\n- Файлы и директории — через общий контейнер (FileManager.containerURL).\n- UserDefaults — через UserDefaults(suiteName:).\n- SQLite / Core Data базы — размещённые в общем контейнере.\n- Кэшированные данные или временные файлы.\n- Shared Keychain (через Keychain Access Groups, близкий механизм).\n\nГде используется:\n- WidgetKit — виджет читает данные из контейнера приложения.\n- Share Extension — передаёт файлы в основное приложение.\n- Notification Service Extension — модифицирует уведомления, используя общие данные.\n\nОграничения:\n- работает только между приложениями одного developer team\n- требует настройки entitlement App Groups в Xcode и Apple Developer Portal.\n\nКоротко: App Group создаёт общий sandbox-контейнер, позволяя приложениям и расширениям безопасно обмениваться файлами, настройками и базами данных."}, {"id": "10000026-0000-0000-0000-000000000026", "question": "Что такое Actors? Где и как они применяются?", "answer": "Actors — это ссылочный тип в языке Swift, предназначенный для безопасной работы с данными в условиях многопоточности. Их главная задача — защитить состояние от гонок данных (data races). Actor изолирует своё состояние (actor isolation). Все обращения к его свойствам/методам извне идут через await и выполняются последовательно (через внутреннюю очередь). Внутри actor-а код выполняется синхронно и безопасно. Actor не допускает чтения своих свойств напрямую, только через методы. Actor может \"прерываться\" на await внутри собственных методов и обрабатывать в это время другой запрос, что потенциально может привести к неожиданному состоянию.\nАкторы применяются в:\n - общих применяемых ресурсах (кэш, счетчики, хранилища)\n - работе с сетью (токены, очереди запросов, ретраи)\n - в качетсве thread-safe singleton\n - в интеграции с UI через MainActor (специальный актор для главного потока)"}, {"id": "10000027-0000-0000-0000-000000000027", "question": "Для чего нужен протокол Sendable?", "answer": "Sendable — это протокол, который используется в Swift Concurrency для гарантии, что тип можно безопасно передавать между потоками и конкурентными контекстами (Task, actor). Он позволяет компилятору предотвращать data race на этапе компиляции. Value-типы соответствуют ему автоматически, если их поля или элементы тоже Sendable. Из reference-типов Sendable соответсвует только Actor, для всех остальных нужно либо обеспечить неизменяемость, либо использовать @unchecked Sendable с ручной гарантией потокобезопасности."}, {"id": "10000028-0000-0000-0000-000000000028", "question": "Что делает и для чего используется @ViewBuilder?", "answer": "@ViewBuilder — это result builder в SwiftUI, который позволяет описывать несколько View в одном блоке и автоматически объединяет их в единый View. Он используется в контейнерах и кастомных компонентах и при использовании условной логики, позволяя возвращать some View вместо AnyView."}, {"id": "10000029-0000-0000-0000-000000000029", "question": "Опишите жизненный цикл View в SwiftUI. Как и когда создаются, обновляются и уничтожаются Views?", "answer": "В SwiftUI View — это структура (value type), а не объект с явным жизненным циклом, как в UIKit. Поэтому жизненный цикл выглядит иначе:\nСоздание:\nView создаётся каждый раз, когда SwiftUI оценивает тело (body) родительского View. Создание lightweight — структура просто инициализируется, а не создаётся как полноценный объект в памяти.\nОбновление (перерисовка)\nКогда меняется состояние (@State, @Binding) или наблюдаемый объект (@ObservedObject, @EnvironmentObject), SwiftUI пересоздаёт соответствующие Views. Перерисовка — это не «модификация существующего объекта», а создание нового экземпляра View с новым body.\nУничтожение\nView удаляется, когда перестаёт быть частью иерархии. Так как это структура, «уничтожение» — это просто удаление экземпляра из памяти, нет методов вроде deinit.\nХранение состояния между пересозданиями\nДля сохранения данных между пересозданиями используют property wrappers:\n   @State — локальное состояние View\n   @ObservedObject / @StateObject — состояние внешнего объекта\n   @EnvironmentObject — глобальное состояние в иерархии\nЭти механизмы позволяют сохранять состояние, даже если структура View пересоздаётся многократно.\n\nМетоды жизненного цикла/модификаторы для отслеживания событий:\n - .onAppear { ... } — вызывается, когда View появляется на экране\n - .onDisappear { ... } — вызывается, когда View исчезает"}, {"id": "10000030-0000-0000-0000-000000000030", "question": "Что такое Combine в iOS, какие ключевые компоненты он использует и как их применять для обработки асинхронных потоков данных?", "answer": "Combine — это декларативный фреймворк Apple для работы с асинхронными потоками данных. Он использует Publishers, которые выпускают значения или ошибки, Subscribers, которые их получают, Operators, чтобы трансформировать и фильтровать данные, и Subjects для передачи данных вручную. Combine позволяет строить цепочки обработки событий, управлять потоками, делать дебаунсинг, объединять и реагировать на изменения состояния в приложении."}, {"id": "10000031-0000-0000-0000-000000000031", "question": "Какие есть механизмы синхронизации в многопоточной среде? Чем DispatchSemaphore отличается от NSLock и как работает barier?", "answer": "NSLock, Serial.sync, DispatchSemaphore, Barer. \nDispatchSemaphore позвовляет предоставлять единовременный доступ к ресурсу для более чем 1 по
